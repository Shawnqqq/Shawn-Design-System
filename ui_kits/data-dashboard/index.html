<!DOCTYPE html>
<html lang="zh-CN" data-layout-guard="uikit-v1">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>详情-Tab图表页</title>
  <style>
:root {
  --text-1: #0C0D0E;
  --text-2: #42464E;
  --text-3: #737A87;
  --text-disabled: #C7CCD6;
  --primary-6: #1764E8;
  --primary-active: #006EFF;
  --bg-white: #FFFFFF;
  --bg-page: #FFFFFF;
  --bg-sidebar: #F6F8FA;
  --bg-hover: #F2F3F5;
  --border-1: #EAEDF1;
  --border-2: #DDE2E9;
  --border-3: #DDE2E9;
  --success-text: #2A814B;
  --success-bg: #E1F6E6;
  --shadow-card: 0 2px 6px 0 rgba(0,0,0,0.05);
  --font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  --color-danger: #d7312a;
  --color-primary: #1764e8;
  --color-success: #2a814b;
  --bg-7: #F6F8FA;
  --color-bg-4: #F6F8FA;
  --color-border-2: #EAEDF1;
  --color-border-3: #DDE2E9;
  --color-text-2: #42464E;
  --color-text-3: #737A87;
  --color-white: #FFFFFF;
  --danger-2: #FFECEC;
  --danger-7: #BD2923;
  --grey-5: #676B72;
  --success-2: #E1F6E6;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-family); height: 100vh; overflow: hidden; background: var(--bg-white); }

/* ═══ Layout ═══ */
.layout { display: flex; flex-direction: column; height: 100vh; }
.layout-body { display: flex; flex: 1; overflow: hidden; }

/* ═══ TopNav ═══ */
.top-nav { height: 48px; background: var(--bg-white); display: flex; align-items: center; box-shadow: var(--shadow-card); position: relative; z-index: 100; width: 100%; flex-shrink: 0; }
.hamburger-btn { width: 48px; height: 48px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; flex-shrink: 0; }
.hamburger-line { width: 16px; height: 2px; background: var(--text-2); border-radius: 1px; }
.nav-logo { width: 103px; height: 24px; flex-shrink: 0; }
.nav-logo svg { height: 24px; width: auto; }
.nav-right { margin-left: auto; display: flex; align-items: center; gap: 16px; padding-right: 16px; }
.search-box { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border: 1px solid var(--border-1); border-radius: 4px; background: var(--color-bg-4); }
.search-input { border: none; outline: none; background: transparent; font-size: 13px; color: var(--text-1); width: 180px; font-family: inherit; }
.search-input::placeholder { color: var(--text-3); }
.nav-link { font-size: 13px; color: var(--text-1); cursor: pointer; white-space: nowrap; }
.nav-icon { width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
.nav-icon svg { width: 16px; height: 16px; }
.notification-dot { position: absolute; top: -2px; right: -2px; width: 6px; height: 6px; background: var(--color-danger); border-radius: 50%; }
.avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--danger-2); color: var(--danger-7); font-size: 15px; font-weight: 700; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }

/* ═══ Sidenav ═══ */
.sidenav {
  display: flex;
  flex-direction: column;
  background: var(--bg-7);
  width: 200px;
  min-width: 200px;
  overflow: hidden;
  flex-shrink: 0;
}
.sidenav-header {
  display: flex;
  flex-shrink: 0;
  align-items: center;
  align-self: stretch;
  column-gap: 6px;
  padding: 20px 22px;
}
.product-icon {
  flex-shrink: 0;
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.product-icon img, .product-icon svg {
  width: 24px;
  height: 24px;
}
.product-name {
  flex-grow: 1;
  height: 24px;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 24px;
  white-space: nowrap;
  color: var(--text-1);
  font-size: 16px;
  font-weight: 500;
}
.sidenav-menu {
  display: flex;
  flex-direction: column;
  flex-grow: 1;
  align-items: flex-start;
  align-self: stretch;
  overflow-y: auto;
}
.menu-section {
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  align-items: flex-start;
  align-self: stretch;
  padding: 0 12px;
  row-gap: 4px;
}
.group-title {
  flex-shrink: 0;
  align-self: stretch;
  padding: 3px 12px;
  overflow: hidden;
  line-height: 20px;
  letter-spacing: 0.04px;
  color: var(--text-3);
  font-size: 12px;
}
.menu-group-block {
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  align-items: flex-start;
  align-self: stretch;
  row-gap: 4px;
  border-radius: 4px;
}
.menu-item {
  display: flex;
  flex-shrink: 0;
  align-items: center;
  align-self: stretch;
  column-gap: 8px;
  padding: 0 12px;
  height: 36px;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.15s;
}
.menu-item.has-arrow { column-gap: 12px; }
.menu-item:hover { background: rgba(0, 0, 0, 0.04); }
.menu-item.active { background: rgba(22, 100, 255, 0.06); }
.menu-item.active .menu-text { color: var(--primary-6); }
.menu-icon {
  flex-shrink: 0;
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.menu-icon img, .menu-icon svg {
  width: 20px;
  height: 20px;
}
.menu-text {
  flex-grow: 1;
  height: 22px;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 22px;
  letter-spacing: 0.04px;
  white-space: nowrap;
  color: var(--text-1);
  font-size: 13px;
}
.menu-chevron {
  flex-shrink: 0;
  width: 12px;
  height: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.menu-chevron svg {
  width: 12px;
  height: 12px;
  color: var(--text-3);
}
.collapse-btn {
  display: inline-flex;
  flex-shrink: 0;
  align-items: flex-start;
  align-self: stretch;
  column-gap: 10px;
  border-top: 1px solid var(--border-2);
  padding: 11px 24px 12px;
  cursor: pointer;
  transition: background 0.15s;
}
.collapse-btn:hover { background: rgba(0, 0, 0, 0.04); }
.collapse-btn svg { width: 16px; height: 16px; color: var(--text-1); }

/* ═══ Content ═══ */
.content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* ═══ PageHeader ═══ */
.page-header-comp {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  background: var(--bg-white);
  width: 100%;
  flex-shrink: 0;
}

.page-header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 32px;
}

.content .page-header-left {
  display: flex;
  flex-direction: row;
  align-items: center;
  flex-wrap: nowrap;
  gap: 12px;
}

.content .page-header-back {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.content .page-header-back svg {
  width: 20px;
  height: 20px;
  color: var(--text-1);
}

.content .page-header-title {
  font-size: 18px;
  font-weight: 500;
  line-height: 26px;
  letter-spacing: 0.05px;
  color: var(--text-1);
  white-space: nowrap;
  flex-shrink: 0;
}

.content .page-header-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 500;
  line-height: 20px;
  letter-spacing: 0.04px;
  flex-shrink: 0;
  white-space: nowrap;
}

.page-header-tag-success {
  background: var(--success-bg);
  color: var(--success-text);
}

.page-header-tag-icon {
  width: 14px;
  height: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.page-header-tag-icon svg {
  width: 14px;
  height: 14px;
}

.page-header-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}

.page-header-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 5px 16px;
  border-radius: 4px;
  border: none;
  background: var(--color-bg-4);
  box-shadow: 0px 0px 0px 1px var(--color-border-3), 0px 2px 1px 0px rgba(0,0,0,0.08);
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  line-height: 22px;
  letter-spacing: 0.04px;
  color: var(--text-2);
  cursor: pointer;
  white-space: nowrap;
  transition: all 150ms ease;
}

.page-header-btn:hover {
  box-shadow: 0px 0px 0px 1px rgba(22,100,255,0.8), 0px 2px 1px 0px rgba(0,0,0,0.08);
  color: var(--primary-6);
}

.page-header-btn-more {
  width: 32px;
  padding: 5px 0;
  font-size: 18px;
  letter-spacing: 2px;
}

/* ═══ Card Tabs ═══ */
.page-header-tabs {
  display: flex;
  align-items: flex-start;
  flex-shrink: 0;
}

.page-header-tabs-spacer {
  flex-shrink: 0;
  box-shadow: inset 0px -1px 0px 0px var(--border-1);
  background: var(--bg-white);
  width: 32px;
  height: 36px;
}

.page-header-tabs-list {
  display: flex;
  align-items: flex-start;
  flex: 1;
}

.page-header-tabs-gap {
  flex-shrink: 0;
  box-shadow: inset 0px -1px 0px 0px var(--border-1);
  background: var(--bg-white);
  width: 6px;
  height: 36px;
}

.page-header-tabs-end {
  flex: 1;
  box-shadow: inset 0px -1px 0px 0px var(--border-1);
  background: var(--bg-white);
  height: 36px;
}

.page-header-tab {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  border-radius: 4px 4px 0 0;
  box-shadow: inset 0px 0px 0px 1px var(--border-1);
  background: var(--bg-sidebar);
  padding: 7px 16px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 400;
  line-height: 22px;
  letter-spacing: 0.04px;
  color: var(--text-1);
  cursor: pointer;
  white-space: nowrap;
  transition: all 150ms ease;
  border: none;
}

.page-header-tab:hover:not(.active) {
  color: var(--primary-6);
}

.page-header-tab.active {
  background: var(--bg-white);
  color: var(--primary-6);
  font-weight: 500;
  box-shadow: inset 0px 2px 0px 0px var(--primary-active), inset -1px 0px 0px 0px var(--border-1), inset 1px 0px 0px 0px var(--border-1);
}

/* ═══ Main Content Area ═══ */
.main-content { flex: 1; overflow-y: auto; padding: 20px 32px; background: var(--bg-white); }

/* ═══ Time Filter ═══ */
.time-filter { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.time-filter-btns { display: flex; align-items: center; gap: 0; }
.time-btn { padding: 5px 16px; font-size: 13px; font-weight: 400; line-height: 22px; color: var(--text-2); background: var(--bg-white); border: 1px solid var(--border-2); cursor: pointer; white-space: nowrap; transition: all 0.15s; }
.time-btn:first-child { border-radius: 4px 0 0 4px; }
.time-btn:last-child { border-radius: 0 4px 4px 0; }
.time-btn + .time-btn { margin-left: -1px; }
.time-btn:hover { color: var(--primary-6); border-color: var(--primary-6); z-index: 1; }
.time-btn.active { color: var(--primary-6); border-color: var(--primary-6); background: rgba(22,100,255,0.04); z-index: 1; }
.date-range { display: flex; align-items: center; gap: 8px; padding: 5px 12px; border: 1px solid var(--border-2); border-radius: 4px; font-size: 13px; color: var(--text-2); cursor: pointer; }
.date-range svg { width: 16px; height: 16px; color: var(--text-3); }

/* ═══ Chart Grid ═══ */
.chart-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.chart-card { border: 1px solid var(--border-1); border-radius: 4px; padding: 16px; background: var(--bg-white); }
.chart-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.chart-card-title { display: flex; align-items: center; gap: 4px; font-size: 13px; font-weight: 500; color: var(--text-1); }
.chart-card-title .info-icon { width: 14px; height: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.chart-card-title .info-icon svg { width: 14px; height: 14px; }
.chart-card-expand { width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.chart-card-expand svg { width: 16px; height: 16px; }
.chart-card-subtitle { font-size: 12px; color: var(--text-3); margin-bottom: 8px; }
.chart-area { width: 100%; aspect-ratio: 320 / 160; position: relative; }

/* ═══ Chart SVG ═══ */
.chart-area svg { width: 100%; height: 100%; display: block; }
.chart-legend { display: flex; align-items: center; gap: 6px; margin-top: 8px; justify-content: center; }
.chart-legend-item { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text-2); }
.chart-legend-dot { width: 8px; height: 8px; background: var(--primary-6); border-radius: 1px; }
  
/* ═══ UIKit Layout Guards ═══ */
.uikit-shell {
  min-width: 0;
  flex-shrink: 1;
}
.uikit-truncate {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.uikit-nowrap {
  white-space: nowrap;
  flex-shrink: 0;
}
.uikit-table-wrap {
  max-width: 100%;
  overflow-x: auto;
  overscroll-behavior-x: contain;
  -webkit-overflow-scrolling: touch;
}
.uikit-responsive-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(0, 1fr));
  gap: 16px;
}
.uikit-main { min-width: 0; }
.uikit-toolbar { min-width: 0; }
.uikit-action-cell { max-width: 160px; }
.uikit-action {
  display: inline-block;
  max-width: 120px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  vertical-align: bottom;
}
@media (max-width: 900px) {
  .uikit-responsive-grid { grid-template-columns: 1fr; }
}
@media (max-width: 640px) {
  .uikit-responsive-grid { grid-template-columns: 1fr; }
  .uikit-stack-sm { flex-direction: column; }
}

</style>
