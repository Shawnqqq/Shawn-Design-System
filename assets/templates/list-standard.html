<!--
  Shawn Design System — 列表页（标准）
  使用方法：复制此文件，替换文字和数据内容。
  变量声明在 :root，按需取用。
  禁止：Tailwind CSS、Lucide 图标、CDN CSS 框架。
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>标准列表页</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.8.5/dist/index.css" />
  <style>
    /* ========== Design Tokens ========== */
    :root {
      --color-primary: #1764E8;
      --color-success: #67C23A;
      --color-warning: #E6A23C;
      --color-danger: #F56C6C;
      --text-primary: rgba(0, 0, 0, 0.85);
      --text-secondary: rgba(0, 0, 0, 0.65);
      --text-muted: rgba(0, 0, 0, 0.45);
      --page-bg: #f5f7fa;
      --card-bg: #fff;
      --table-header-bg: #fafafa;
      --font-stack: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica,
                    'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    /* ========== Reset & Base ========== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      font-family: var(--font-stack);
      font-size: 14px;
      color: var(--text-primary);
      background: var(--page-bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .page-container {
      padding: 20px;
      min-height: 100vh;
    }

    .page-header {
      margin-bottom: 32px;
    }

    .page-header h1 {
      font-size: 28px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .page-header p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    /* ========== Filter Bar ========== */
    .filter-bar {
      margin-bottom: 12px;
    }

    .filter-bar .el-form--inline {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .filter-bar .el-form-item {
      margin-bottom: 0;
      margin-right: 0;
    }

    .filter-bar .el-input,
    .filter-bar .el-select,
    .filter-bar .el-date-editor {
      width: 180px;
    }

    .filter-bar .el-date-editor--daterange {
      width: 260px;
    }

    .filter-bar .el-button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-left: 0;
    }

    .filter-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filter-actions .el-button,
    .filter-actions .el-dropdown .el-button,
    .filter-actions .el-dropdown .el-button-group .el-button {
      margin-left: 0;
    }

    .filter-actions .el-dropdown .el-button-group {
      display: inline-flex;
    }

    /* ========== Table Area ========== */
    .table-area .el-table tr th,
    .table-area .el-table tr td {
      padding: 4px;
      font-size: 12px;
    }

    /* ========== Pagination Bar ========== */
    .pagination-bar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-top: 12px;
      gap: 16px;
    }

    .pagination-total {
      font-size: 12px;
      color: var(--text-muted);
    }

    .pagination-bar .el-pagination {
      --el-pagination-font-size: 12px;
    }

    .pagination-bar .el-pagination .el-input {
      width: 80px;
    }

    /* ========== Batch Action Bar ========== */
    .batch-action-bar {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      background: #f0f5ff;
      border: 1px solid #d0e0ff;
      border-radius: 4px;
      margin-bottom: 8px;
    }

    .batch-info {
      margin-right: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .batch-info strong {
      color: var(--color-primary);
      font-weight: 600;
    }

    .batch-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .batch-actions .el-button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-left: 0;
    }

    /* ========== Batch Add Dialog ========== */
    .batch-add-step {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }

    .batch-add-step-num {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--color-primary);
      color: #fff;
      font-size: 12px;
      line-height: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .batch-add-card {
      border: 1px solid rgba(0, 0, 0, 0.06);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .batch-add-card-icon {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background: rgba(23, 100, 232, 0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .batch-add-card-icon .el-icon {
      font-size: 22px;
      color: var(--color-primary);
    }

    .batch-add-card-body {
      flex: 1;
      min-width: 0;
    }

    .batch-add-card-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 2px;
    }

    .batch-add-card-desc {
      font-size: 12px;
      color: var(--text-muted);
    }

    .batch-add-upload .el-upload {
      width: 100%;
    }

    .batch-add-upload .el-upload-dragger {
      width: 100%;
      padding: 32px 0;
      border-radius: 8px;
      border-color: rgba(0, 0, 0, 0.08);
      background: var(--card-bg);
    }

    .batch-add-upload .el-upload-dragger:hover {
      border-color: var(--color-primary);
    }

    .batch-add-file {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      font-size: 12px;
      color: var(--color-success);
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="page-container">
      <div class="page-header">
        <h1>列表页（标准）</h1>
        <p>筛选栏 + 表格 + 分页 + 批量操作，适用于大多数 CRUD 列表场景</p>
      </div>

      <!-- 筛选区 -->
      <div class="filter-bar">
        <el-form :inline="true" :model="filterForm" @submit.prevent="handleSearch">
          <el-form-item>
            <el-input
              v-model="filterForm.keyword"
              placeholder="搜索名称"
              clearable
              @keyup.enter="handleSearch"
            >
              <template #prefix>
                <el-icon><Search></Search></el-icon>
              </template>
            </el-input>
          </el-form-item>
          <el-form-item>
            <el-select v-model="filterForm.status" placeholder="状态" clearable>
              <el-option label="筹备中" value="preparing"></el-option>
              <el-option label="未开始" value="pending"></el-option>
              <el-option label="进行中" value="inProgress"></el-option>
              <el-option label="已完成" value="completed"></el-option>
            </el-select>
          </el-form-item>
          <el-form-item>
            <el-date-picker
              v-model="filterForm.dateRange"
              type="daterange"
              range-separator="-"
              start-placeholder="开始日期"
              end-placeholder="结束日期"
              value-format="YYYY-MM-DD"
            ></el-date-picker>
          </el-form-item>
          <el-form-item>
            <el-button type="primary" @click="handleSearch">
              <el-icon><Search></Search></el-icon>
              查询
            </el-button>
          </el-form-item>
          <el-form-item>
            <el-button @click="handleReset">
              <el-icon><Refresh></Refresh></el-icon>
              重置
            </el-button>
          </el-form-item>
          <div class="filter-actions">
            <el-button :disabled="selectedRows.length === 0" @click="handleBatchExport">
              <el-icon><Download></Download></el-icon>
              批量导出
            </el-button>
            <el-dropdown split-button type="primary" @click="handleAdd" @command="handleDropdownCommand">
              <el-icon><Plus></Plus></el-icon>
              新增项目
              <template #dropdown>
                <el-dropdown-menu>
                  <el-dropdown-item command="batchAdd">
                    <el-icon><Plus></Plus></el-icon>
                    批量新增
                  </el-dropdown-item>
                  <el-dropdown-item command="batchDelete" :disabled="selectedRows.length === 0" divided>
                    <el-icon><Delete></Delete></el-icon>
                    批量删除
                  </el-dropdown-item>
                </el-dropdown-menu>
              </template>
            </el-dropdown>
          </div>
        </el-form>
      </div>

      <!-- 选中操作栏 -->
      <div v-if="selectedRows.length > 0" class="batch-action-bar">
        <div class="batch-info">
          已选中 <strong>{{ selectedRows.length }}</strong> 项
        </div>
        <div class="batch-actions">
          <el-button size="small" @click="clearSelection">取消选择</el-button>
          <el-button size="small" type="danger" plain @click="handleBatchDelete">
            <el-icon><Delete></Delete></el-icon>
            批量删除
          </el-button>
          <el-button size="small" type="primary" plain @click="handleBatchExport">
            <el-icon><Download></Download></el-icon>
            批量导出
          </el-button>
        </div>
      </div>

      <!-- 表格区 -->
      <div class="table-area">
        <el-table
          ref="tableRef"
          v-loading="loading"
          :data="tableData"
          border
          stripe
          style="width: 100%"
          @selection-change="handleSelectionChange"
        >
          <el-table-column type="selection" width="46" fixed="left" align="center"></el-table-column>
          <el-table-column prop="name" label="名称" min-width="180" show-overflow-tooltip></el-table-column>
          <el-table-column prop="code" label="编号" width="130"></el-table-column>
          <el-table-column prop="priority" label="优先级" width="80" align="center">
            <template #default="{ row }">
              <el-tag :type="priorityTagType(row.priority)" size="small" effect="dark">
                {{ priorityLabel(row.priority) }}
              </el-tag>
            </template>
          </el-table-column>
          <el-table-column prop="category" label="分类" width="120"></el-table-column>
          <el-table-column prop="owner" label="负责人" width="100"></el-table-column>
          <el-table-column prop="createdAt" label="创建时间" width="165"></el-table-column>
          <el-table-column prop="amount" label="金额" width="130" align="right">
            <template #default="{ row }">
              ¥{{ row.amount.toLocaleString() }}
            </template>
          </el-table-column>
          <el-table-column prop="notes" label="备注" min-width="220" show-overflow-tooltip></el-table-column>
          <el-table-column prop="status" label="状态" width="270" align="center" fixed="right">
            <template #default="{ row }">
              <el-radio-group v-model="row.status" size="small" @change="handleStatusChange(row)">
                <el-radio-button label="筹备中" value="preparing"></el-radio-button>
                <el-radio-button label="未开始" value="pending"></el-radio-button>
                <el-radio-button label="进行中" value="inProgress"></el-radio-button>
                <el-radio-button label="已结班" value="completed"></el-radio-button>
              </el-radio-group>
            </template>
          </el-table-column>
          <el-table-column prop="onShelf" label="上架" width="80" align="center" fixed="right">
            <template #default="{ row }">
              <el-switch v-model="row.onShelf" @change="handleShelfChange(row)"></el-switch>
            </template>
          </el-table-column>
          <el-table-column label="操作" width="120" fixed="right" align="center">
            <template #default="{ row }">
              <el-button type="primary" link @click="handleEdit(row)">编辑</el-button>
              <el-divider direction="vertical"></el-divider>
              <el-button type="danger" link @click="handleDelete(row)">删除</el-button>
            </template>
          </el-table-column>
        </el-table>

        <!-- 分页栏 -->
        <div class="pagination-bar">
          <span class="pagination-total" style="margin-right: auto;">共 {{ total }} 条</span>
          <el-pagination
            v-model:current-page="pagination.page"
            v-model:page-size="pagination.pageSize"
            :page-sizes="[20, 50, 100, 200, 500]"
            :total="total"
            layout="sizes, prev, pager, next, jumper"
            @size-change="handlePageChange"
            @current-change="handlePageChange"
          ></el-pagination>
        </div>
      </div>
    </div>

    <!-- 批量新增弹框 -->
    <el-dialog
      v-model="batchAddVisible"
      title="批量新增"
      width="480px"
      :close-on-click-modal="false"
      destroy-on-close
      @closed="resetBatchAdd"
    >
      <!-- Step 1: 下载模板 -->
      <div class="batch-add-step">
        <span class="batch-add-step-num">1</span>
        下载模板
      </div>
      <div class="batch-add-card">
        <div class="batch-add-card-icon">
          <el-icon><Document></Document></el-icon>
        </div>
        <div class="batch-add-card-body">
          <div class="batch-add-card-title">项目新增导入模版</div>
          <div class="batch-add-card-desc">按模板格式填写数据</div>
        </div>
        <el-button type="primary" plain size="small" @click="handleDownloadTemplate">
          <el-icon><Download></Download></el-icon>
          下载模板
        </el-button>
      </div>

      <!-- Step 2: 上传文件 -->
      <div class="batch-add-step">
        <span class="batch-add-step-num">2</span>
        上传文件
      </div>
      <el-upload
        ref="uploadRef"
        class="batch-add-upload"
        drag
        action=""
        :auto-upload="false"
        :limit="1"
        accept=".xlsx,.xls"
        :on-change="handleFileChange"
        :on-exceed="handleFileExceed"
      >
        <el-icon style="font-size: 36px; color: rgba(0,0,0,0.15); margin-bottom: 8px;">
          <UploadFilled></UploadFilled>
        </el-icon>
        <div style="font-size: 12px; color: rgba(0,0,0,0.65);">
          拖拽文件到此处，或<em style="color: #1764E8; font-style: normal; font-weight: 500;">点击上传</em>
        </div>
        <div style="font-size: 12px; color: rgba(0,0,0,0.35); margin-top: 4px;">
          支持 .xlsx / .xls 格式
        </div>
      </el-upload>
      <div v-if="batchAddFile" class="batch-add-file">
        <el-icon><CircleCheck></CircleCheck></el-icon>
        {{ batchAddFile.name }}
      </div>

      <template #footer>
        <el-button @click="batchAddVisible = false">取消</el-button>
        <el-button type="primary" :disabled="!batchAddFile" @click="handleBatchAddSubmit">
          确认导入
        </el-button>
      </template>
    </el-dialog>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus@2.8.5/dist/index.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@element-plus/icons-vue@2.3.1/dist/index.iife.min.js"></script>
  <script>
    const { createApp, ref, reactive } = Vue;

    /* ---- 中文语言包 ---- */
    const zhCn = {
      name: 'zh-cn',
      el: {
        pagination: { goto: '前往', pagesize: '条/页', total: '共 {total} 条', pageClassifier: '页', page: '页', prev: '上一页', next: '下一页', currentPage: '第 {pager} 页' },
        select: { loading: '加载中', noMatch: '无匹配数据', noData: '暂无数据', placeholder: '请选择' },
        table: { emptyText: '暂无数据', confirmFilter: '确认', resetFilter: '重置', clearFilter: '全部', sumText: '合计' },
        datepicker: { now: '此刻', today: '今天', cancel: '取消', clear: '清空', confirm: '确定', startDate: '开始日期', startTime: '开始时间', endDate: '结束日期', endTime: '结束时间', prevYear: '前一年', nextYear: '后一年', prevMonth: '上个月', nextMonth: '下个月', year: '年', month1: '1月', month2: '2月', month3: '3月', month4: '4月', month5: '5月', month6: '6月', month7: '7月', month8: '8月', month9: '9月', month10: '10月', month11: '11月', month12: '12月', weeks: { sun: '日', mon: '一', tue: '二', wed: '三', thu: '四', fri: '五', sat: '六' }, months: { jan: '一月', feb: '二月', mar: '三月', apr: '四月', may: '五月', jun: '六月', jul: '七月', aug: '八月', sep: '九月', oct: '十月', nov: '十一月', dec: '十二月' } },
      },
    };

    const app = createApp({
      setup() {
        /* ---- 筛选表单 ---- */
        const filterForm = reactive({
          keyword: '',
          status: '',
          dateRange: null,
        });

        /* ---- 加载状态 ---- */
        const loading = ref(false);

        /* ---- 分页 ---- */
        const pagination = reactive({
          page: 1,
          pageSize: 50,
        });
        const total = ref(128);

        /* ---- 示例数据 ---- */
        const tableData = ref([
          { id: 1,  name: '2026年新员工入职培训计划',       code: 'PROJ-001', status: 'inProgress',  onShelf: true,  priority: 'high',   category: '人力资源',   owner: '张三', createdAt: '2026-07-10 09:30:00', amount: 12800,   notes: '面向Q3季度新入职员工的标准化培训方案，涵盖企业文化、制度规范、岗位技能三大模块，预计培训人数约50人' },
          { id: 2,  name: '供应链管理高级研修班',           code: 'PROJ-002', status: 'completed',   onShelf: true,  priority: 'medium', category: '采购管理',   owner: '李四', createdAt: '2026-07-09 14:20:00', amount: 56000,   notes: '与知名商学院合作开设的供应链专题课程，面向中高层管理人员，为期12周系统化培训' },
          { id: 3,  name: '客户关系管理系统升级项目',       code: 'PROJ-003', status: 'inProgress',  onShelf: false, priority: 'high',   category: '信息技术',   owner: '王五', createdAt: '2026-07-08 11:05:00', amount: 198000,  notes: 'CRM平台从v2.x迁移至v3.x，涉及数据清洗、接口重构、权限体系重建等工作，项目已暂停' },
          { id: 4,  name: '企业内训师认证与激励方案',       code: 'PROJ-004', status: 'preparing',   onShelf: false, priority: 'low',    category: '人力资源',   owner: '赵六', createdAt: '2026-07-07 16:45:00', amount: 45000,   notes: '建立内部讲师选拔、培训、认证及课酬激励的完整体系，预计首批认证30名内训师' },
          { id: 5,  name: '数据同步中间件性能优化',         code: 'PROJ-005', status: 'pending',     onShelf: true,  priority: 'medium', category: '信息技术',   owner: '孙七', createdAt: '2026-07-06 08:10:00', amount: 32000,   notes: '基于CDC的实时数据同步服务在高并发场景下存在延迟，需优化消费端批量写入策略，目标延迟降至500ms以内' },
          { id: 6,  name: '销售团队季度冲刺培训',           code: 'PROJ-006', status: 'completed',   onShelf: true,  priority: 'medium', category: '市场营销',   owner: '周八', createdAt: '2026-07-05 10:30:00', amount: 18500,   notes: '针对华东区销售团队的季度业绩冲刺专项培训，包含话术演练、客户画像分析等实战内容' },
          { id: 7,  name: '权限网关服务安全审计',           code: 'PROJ-007', status: 'preparing',   onShelf: false, priority: 'high',   category: '信息安全',   owner: '吴九', createdAt: '2026-07-04 15:00:00', amount: 86000,   notes: '对统一认证中心进行年度安全审计，覆盖OAuth2.0流程、Token管理、SSO会话等关键环节，审计周期约3个月' },
          { id: 8,  name: '财务报表引擎自动化测试建设',     code: 'PROJ-008', status: 'pending',     onShelf: true,  priority: 'low',    category: '财务管理',   owner: '郑十', createdAt: '2026-07-03 09:15:00', amount: 27600,   notes: '为资产负债表、利润表、现金流量表等核心报表搭建自动化回归测试框架与用例集，覆盖率目标80%以上' },
        ]);

        /* ---- 优先级映射 ---- */
        function priorityTagType(priority) {
          const map = { high: 'danger', medium: 'warning', low: 'info' };
          return map[priority] || '';
        }

        function priorityLabel(priority) {
          const map = { high: '高', medium: '中', low: '低' };
          return map[priority] || priority;
        }

        function handleStatusChange(row) {
          ElementPlus.ElMessage.info(row.name + ' 状态已变更');
        }

        function handleShelfChange(row) {
          ElementPlus.ElMessage.info(row.name + (row.onShelf ? ' 已上架' : ' 已下架'));
        }

        /* ---- 事件处理 ---- */
        function handleSearch() {
          ElementPlus.ElMessage.success('查询条件：' + JSON.stringify({ keyword: filterForm.keyword, status: filterForm.status, dateRange: filterForm.dateRange }));
        }

        function handleReset() {
          filterForm.keyword = '';
          filterForm.status = '';
          filterForm.dateRange = null;
          pagination.page = 1;
          ElementPlus.ElMessage.info('已重置筛选条件');
        }

        function handleEdit(row) {
          ElementPlus.ElMessage.info('编辑：' + row.name);
        }

        function handleDelete(row) {
          ElementPlus.ElMessageBox.confirm(
            '确定删除「' + row.name + '」？删除后无法恢复。',
            '确认删除',
            { confirmButtonText: '删除', cancelButtonText: '取消', type: 'warning' }
          ).then(() => {
            ElementPlus.ElMessage.success('已删除：' + row.name);
          }).catch(() => {});
        }

        function handleAdd() {
          ElementPlus.ElMessage.info('新增项目');
        }

        /* ---- 选择与批量操作 ---- */
        const tableRef = ref(null);
        const selectedRows = ref([]);

        function handleSelectionChange(rows) {
          selectedRows.value = rows;
        }

        function clearSelection() {
          if (tableRef.value) {
            tableRef.value.clearSelection();
          }
          selectedRows.value = [];
        }

        function handleDropdownCommand(command) {
          if (command === 'batchAdd') {
            batchAddVisible.value = true;
          } else if (command === 'batchDelete') {
            handleBatchDelete();
          }
        }

        function handleBatchDelete() {
          if (selectedRows.value.length === 0) return;
          ElementPlus.ElMessageBox.confirm(
            '确定删除所选 ' + selectedRows.value.length + ' 项？删除后无法恢复。',
            '批量删除',
            { confirmButtonText: '删除', cancelButtonText: '取消', type: 'warning' }
          ).then(() => {
            ElementPlus.ElMessage.success('已批量删除 ' + selectedRows.value.length + ' 项');
            clearSelection();
          }).catch(() => {});
        }

        function handleBatchExport() {
          if (selectedRows.value.length === 0) return;
          ElementPlus.ElMessage.success('正在导出 ' + selectedRows.value.length + ' 条数据...');
        }

        /* ---- 批量新增弹框 ---- */
        const batchAddVisible = ref(false);
        const uploadRef = ref(null);
        const batchAddFile = ref(null);

        function handleDownloadTemplate() {
          ElementPlus.ElMessage.success('模板下载中...');
        }

        function handleFileChange(file) {
          batchAddFile.value = file;
        }

        function handleFileExceed() {
          ElementPlus.ElMessage.warning('只能上传一个文件，请先移除已选文件');
        }

        function handleBatchAddSubmit() {
          if (!batchAddFile.value) {
            ElementPlus.ElMessage.warning('请先选择文件');
            return;
          }
          ElementPlus.ElMessage.success('数据导入成功');
          batchAddVisible.value = false;
        }

        function resetBatchAdd() {
          batchAddFile.value = null;
        }

        function handlePageChange() {
          // 替换为实际接口调用
        }

        return {
          filterForm,
          loading,
          pagination,
          total,
          tableData,
          tableRef,
          selectedRows,
          batchAddVisible,
          uploadRef,
          priorityTagType,
          priorityLabel,
          handleStatusChange,
          handleShelfChange,
          handleSearch,
          handleReset,
          handleEdit,
          handleDelete,
          handleAdd,
          handleSelectionChange,
          clearSelection,
          handleDropdownCommand,
          handleBatchDelete,
          handleBatchExport,
          handleDownloadTemplate,
          handleFileChange,
          handleFileExceed,
          handleBatchAddSubmit,
          resetBatchAdd,
          handlePageChange,
        };
      },
    });

    app.use(ElementPlus, { locale: zhCn });
    for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
      app.component(key, component);
    }
    app.mount('#app');
  </script>
</body>
</html>
