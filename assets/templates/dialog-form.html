<!--
  Shawn Design System — 弹框表单
  变体：列表 + 新增/编辑弹框 + 多步骤弹框
  使用方法：复制此文件，替换字段、数据和接口调用。
  变量声明在 :root，按需取用。
  禁止：Tailwind CSS、Lucide 图标、CDN CSS 框架。
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>弹框表单</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.8.5/dist/index.css" />
  <style>
    :root {
      --color-primary: #1764E8;
      --color-success: #67C23A;
      --color-warning: #E6A23C;
      --color-danger: #F56C6C;
      --text-primary: rgba(0, 0, 0, 0.85);
      --text-secondary: rgba(0, 0, 0, 0.65);
      --text-muted: rgba(0, 0, 0, 0.45);
      --page-bg: #f5f7fa;
      --card-bg: #fff;
      --table-header-bg: #fafafa;
      --font-stack: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica,
                    'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    *,
    *::before,
    *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: var(--font-stack);
      font-size: 14px;
      color: var(--text-primary);
      background: var(--page-bg);
      -webkit-font-smoothing: antialiased;
    }

    .page-container { padding: 20px; min-height: 100vh; }

    .page-header {
      margin-bottom: 32px;
    }

    .page-header h1 {
      font-size: 28px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .page-header p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    /* ========== Filter Bar ========== */
    .filter-bar {
      margin-bottom: 12px;
    }

    .filter-bar .el-form--inline {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .filter-bar .el-form-item {
      margin-bottom: 0;
      margin-right: 0;
    }

    .filter-bar .el-input,
    .filter-bar .el-select,
    .filter-bar .el-date-editor {
      width: 180px;
    }

    .filter-bar .el-button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-left: 0;
    }

    .filter-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filter-actions .el-button {
      margin-left: 0;
    }

    /* ========== Table Area ========== */
    .table-area .el-table tr th,
    .table-area .el-table tr td {
      padding: 4px;
      font-size: 12px;
    }

    /* ========== Pagination Bar ========== */
    .pagination-bar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-top: 12px;
      gap: 16px;
    }

    .pagination-total {
      font-size: 12px;
      color: var(--text-muted);
    }

    .pagination-bar .el-pagination {
      --el-pagination-font-size: 12px;
    }

    .pagination-bar .el-pagination .el-input {
      width: 80px;
    }

    /* ========== Dialog Form ========== */
    .dialog-form .el-form-item__label {
      color: var(--text-secondary);
    }

    .dialog-form .el-input,
    .dialog-form .el-select,
    .dialog-form .el-textarea,
    .dialog-form .el-date-editor {
      width: 100%;
    }

    .dialog-form .el-form-item {
      margin-bottom: 16px;
    }

    .dialog-form .el-form-item:last-child {
      margin-bottom: 0;
    }

    /* ========== Steps Dialog ========== */
    .steps-content {
      min-height: 200px;
      padding-top: 20px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="page-container">
      <div class="page-header">
        <h1>弹框表单</h1>
        <p>标准弹框表单 + 多步骤弹框表单（含步骤验证），适用于弹窗内的表单操作</p>
      </div>

      <!-- 筛选区 + 操作按钮 -->
      <div class="filter-bar">
        <el-form :inline="true" :model="filterForm" @submit.prevent="handleSearch">
          <el-form-item>
            <el-input
              v-model="filterForm.keyword"
              placeholder="搜索名称"
              clearable
              @keyup.enter="handleSearch"
            >
              <template #prefix>
                <el-icon><Search></Search></el-icon>
              </template>
            </el-input>
          </el-form-item>
          <el-form-item>
            <el-select v-model="filterForm.status" placeholder="状态" clearable>
              <el-option label="启用" value="active"></el-option>
              <el-option label="禁用" value="disabled"></el-option>
              <el-option label="草稿" value="draft"></el-option>
            </el-select>
          </el-form-item>
          <el-form-item>
            <el-button type="primary" @click="handleSearch">
              <el-icon><Search></Search></el-icon>
              查询
            </el-button>
          </el-form-item>
          <el-form-item>
            <el-button @click="handleReset">
              <el-icon><Refresh></Refresh></el-icon>
              重置
            </el-button>
          </el-form-item>
          <div class="filter-actions">
            <el-button type="primary" @click="handleAdd">
              <el-icon><Plus></Plus></el-icon>
              新增
            </el-button>
            <el-button @click="handleStepsAdd">
              <el-icon><Plus></Plus></el-icon>
              分步新增
            </el-button>
          </div>
        </el-form>
      </div>

      <!-- 表格区 -->
      <div class="table-area">
        <el-table v-loading="loading" :data="tableData" border stripe style="width: 100%">
          <el-table-column prop="code" label="编码" width="140" show-overflow-tooltip></el-table-column>
          <el-table-column prop="name" label="名称" min-width="180" show-overflow-tooltip></el-table-column>
          <el-table-column prop="type" label="类型" width="110" align="center">
            <template #default="{ row }">
              <el-tag size="small" effect="plain">{{ row.type }}</el-tag>
            </template>
          </el-table-column>
          <el-table-column prop="version" label="版本" width="90" align="center"></el-table-column>
          <el-table-column prop="status" label="状态" width="90" align="center">
            <template #default="{ row }">
              <el-tag :type="statusTagType(row.status)" size="small" effect="light">
                {{ statusLabel(row.status) }}
              </el-tag>
            </template>
          </el-table-column>
          <el-table-column prop="owner" label="负责人" width="100"></el-table-column>
          <el-table-column prop="description" label="描述" min-width="220" show-overflow-tooltip></el-table-column>
          <el-table-column prop="updatedAt" label="更新时间" width="165"></el-table-column>
          <el-table-column label="操作" width="140" fixed="right" align="center">
            <template #default="{ row }">
              <el-button type="primary" link @click="handleEdit(row)">编辑</el-button>
              <el-divider direction="vertical"></el-divider>
              <el-button type="danger" link @click="handleDelete(row)">删除</el-button>
            </template>
          </el-table-column>
        </el-table>

        <div class="pagination-bar">
          <span class="pagination-total">共 {{ total }} 条</span>
          <el-pagination
            v-model:current-page="pagination.page"
            v-model:page-size="pagination.pageSize"
            :page-sizes="[20, 50, 100, 200, 500]"
            :total="total"
            layout="sizes, prev, pager, next, jumper"
            @size-change="handlePageChange"
            @current-change="handlePageChange"
          ></el-pagination>
        </div>
      </div>

      <!-- 弹框表单：新增/编辑 -->
      <el-dialog
        v-model="dialogVisible"
        :title="dialogTitle"
        width="720px"
        :destroy-on-close="true"
        @closed="handleDialogClosed"
      >
        <el-form ref="formRef" :model="formData" :rules="formRules" label-width="100px" class="dialog-form">
          <el-form-item label="名称" prop="name">
            <el-input v-model="formData.name" placeholder="请输入名称" maxlength="50" show-word-limit clearable></el-input>
          </el-form-item>
          <el-form-item label="类型" prop="type">
            <el-select v-model="formData.type" placeholder="请选择类型" clearable>
              <el-option label="基础模块" value="基础模块"></el-option>
              <el-option label="业务组件" value="业务组件"></el-option>
              <el-option label="工具服务" value="工具服务"></el-option>
              <el-option label="数据引擎" value="数据引擎"></el-option>
            </el-select>
          </el-form-item>
          <el-form-item label="描述" prop="description">
            <el-input v-model="formData.description" type="textarea" placeholder="请输入描述" :autosize="{ minRows: 3, maxRows: 6 }" maxlength="500" show-word-limit></el-input>
          </el-form-item>
          <el-form-item label="日期" prop="date">
            <el-date-picker v-model="formData.date" type="date" placeholder="请选择日期" value-format="YYYY-MM-DD" style="width: 100%"></el-date-picker>
          </el-form-item>
          <el-form-item label="状态" prop="status">
            <el-switch v-model="formData.status" active-text="启用" inactive-text="禁用" active-value="active" inactive-value="disabled"></el-switch>
          </el-form-item>
        </el-form>
        <template #footer>
          <el-button @click="dialogVisible = false">取消</el-button>
          <el-button type="primary" :loading="submitLoading" @click="handleSubmit">确定</el-button>
        </template>
      </el-dialog>

      <!-- 弹框表单：分步新增 -->
      <el-dialog
        v-model="stepsDialogVisible"
        title="分步新增"
        width="640px"
        :destroy-on-close="true"
        @closed="resetStepsForm"
      >
        <el-steps :active="stepsActive" finish-status="success" style="margin-bottom: 8px;">
          <el-step title="基本信息"></el-step>
          <el-step title="配置项"></el-step>
          <el-step title="确认"></el-step>
        </el-steps>

        <div class="steps-content">
          <!-- Step 1 -->
          <el-form v-if="stepsActive === 0" ref="stepsForm1Ref" :model="stepsForm" :rules="stepsRules1" label-width="100px" class="dialog-form">
            <el-form-item label="名称" prop="name">
              <el-input v-model="stepsForm.name" placeholder="请输入名称"></el-input>
            </el-form-item>
            <el-form-item label="类型" prop="type">
              <el-select v-model="stepsForm.type" placeholder="请选择类型">
                <el-option label="基础模块" value="基础模块"></el-option>
                <el-option label="业务组件" value="业务组件"></el-option>
                <el-option label="工具服务" value="工具服务"></el-option>
              </el-select>
            </el-form-item>
          </el-form>

          <!-- Step 2 -->
          <el-form v-if="stepsActive === 1" :model="stepsForm" label-width="100px" class="dialog-form">
            <el-form-item label="负责人">
              <el-input v-model="stepsForm.owner" placeholder="请输入负责人"></el-input>
            </el-form-item>
            <el-form-item label="优先级">
              <el-radio-group v-model="stepsForm.priority">
                <el-radio value="high">高</el-radio>
                <el-radio value="medium">中</el-radio>
                <el-radio value="low">低</el-radio>
              </el-radio-group>
            </el-form-item>
            <el-form-item label="备注">
              <el-input v-model="stepsForm.remark" type="textarea" :rows="3" placeholder="补充说明"></el-input>
            </el-form-item>
          </el-form>

          <!-- Step 3: 确认 -->
          <div v-if="stepsActive === 2">
            <el-descriptions :column="1" border>
              <el-descriptions-item label="名称">{{ stepsForm.name }}</el-descriptions-item>
              <el-descriptions-item label="类型">{{ stepsForm.type }}</el-descriptions-item>
              <el-descriptions-item label="负责人">{{ stepsForm.owner || '-' }}</el-descriptions-item>
              <el-descriptions-item label="优先级">{{ stepsForm.priority === 'high' ? '高' : stepsForm.priority === 'medium' ? '中' : '低' }}</el-descriptions-item>
              <el-descriptions-item label="备注">{{ stepsForm.remark || '-' }}</el-descriptions-item>
            </el-descriptions>
          </div>
        </div>

        <template #footer>
          <el-button v-if="stepsActive > 0" @click="stepsActive--">上一步</el-button>
          <el-button v-if="stepsActive < 2" type="primary" @click="handleStepsNext">下一步</el-button>
          <el-button v-if="stepsActive === 2" type="primary" @click="handleStepsSubmit">确认提交</el-button>
        </template>
      </el-dialog>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus@2.8.5/dist/index.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@element-plus/icons-vue@2.3.1/dist/index.iife.min.js"></script>
  <script>
    const { createApp, ref, reactive, computed } = Vue;

    const zhCn = {
      name: 'zh-cn',
      el: {
        pagination: { goto: '前往', pagesize: '条/页', total: '共 {total} 条', pageClassifier: '页', page: '页', prev: '上一页', next: '下一页', currentPage: '第 {pager} 页' },
        select: { loading: '加载中', noMatch: '无匹配数据', noData: '暂无数据', placeholder: '请选择' },
        table: { emptyText: '暂无数据', confirmFilter: '确认', resetFilter: '重置', clearFilter: '全部', sumText: '合计' },
        datepicker: { now: '此刻', today: '今天', cancel: '取消', clear: '清空', confirm: '确定', startDate: '开始日期', startTime: '开始时间', endDate: '结束日期', endTime: '结束时间', prevYear: '前一年', nextYear: '后一年', prevMonth: '上个月', nextMonth: '下个月', year: '年', month1: '1月', month2: '2月', month3: '3月', month4: '4月', month5: '5月', month6: '6月', month7: '7月', month8: '8月', month9: '9月', month10: '10月', month11: '11月', month12: '12月', weeks: { sun: '日', mon: '一', tue: '二', wed: '三', thu: '四', fri: '五', sat: '六' }, months: { jan: '一月', feb: '二月', mar: '三月', apr: '四月', may: '五月', jun: '六月', jul: '七月', aug: '八月', sep: '九月', oct: '十月', nov: '十一月', dec: '十二月' } },
      },
    };

    const app = createApp({
      setup() {
        /* ---- 筛选 ---- */
        const filterForm = reactive({ keyword: '', status: '' });
        const loading = ref(false);
        const pagination = reactive({ page: 1, pageSize: 50 });
        const total = ref(128);

        /* ---- 表格数据 ---- */
        const tableData = ref([
          { id: 1, code: 'MOD-2026-001', name: '供应链管理模块',     type: '基础模块', version: 'v2.3.1', status: 'active',   owner: '张伟',   description: '覆盖采购、仓储、物流全链路的供应链核心模块', updatedAt: '2026-07-10 09:30:00' },
          { id: 2, code: 'CMP-2026-012', name: '客户关系管理系统',   type: '业务组件', version: 'v1.8.0', status: 'active',   owner: '李娜',   description: '集成客户画像、跟进记录、商机漏斗等功能', updatedAt: '2026-07-09 14:20:00' },
          { id: 3, code: 'ENG-2026-005', name: '财务报表引擎',       type: '数据引擎', version: 'v3.1.2', status: 'disabled', owner: '王强',   description: '支持多维度财务数据聚合、自动出具三大报表', updatedAt: '2026-07-08 11:05:00' },
          { id: 4, code: 'SRV-2026-008', name: '统一权限网关服务',   type: '工具服务', version: 'v1.2.0', status: 'draft',    owner: '赵敏',   description: '基于 RBAC 模型的统一鉴权网关', updatedAt: '2026-07-07 16:45:00' },
          { id: 5, code: 'SRV-2026-011', name: '数据同步中间件',     type: '工具服务', version: 'v2.0.3', status: 'active',   owner: '孙鹏',   description: '支持异构数据源的实时增量同步', updatedAt: '2026-07-06 08:10:00' },
          { id: 6, code: 'CMP-2026-015', name: '审批流程引擎',       type: '业务组件', version: 'v1.5.4', status: 'active',   owner: '周洋',   description: '可视化流程编排引擎，支持串行、并行、条件分支', updatedAt: '2026-07-05 17:20:00' },
        ]);

        /* ---- 普通弹框 ---- */
        const dialogVisible = ref(false);
        const dialogMode = ref('add');
        const submitLoading = ref(false);
        const formRef = ref(null);

        const dialogTitle = computed(() => dialogMode.value === 'add' ? '新增' : '编辑');

        const defaultFormData = () => ({ name: '', type: '', description: '', date: '', status: 'active' });
        const formData = reactive(defaultFormData());

        const formRules = {
          name: [{ required: true, message: '请输入名称', trigger: 'blur' }],
          type: [{ required: true, message: '请选择类型', trigger: 'change' }],
          description: [{ required: true, message: '请输入描述', trigger: 'blur' }],
          date: [{ required: true, message: '请选择日期', trigger: 'change' }],
        };

        /* ---- 分步弹框 ---- */
        const stepsDialogVisible = ref(false);
        const stepsActive = ref(0);
        const stepsForm1Ref = ref(null);

        const defaultStepsForm = () => ({ name: '', type: '', owner: '', priority: 'medium', remark: '' });
        const stepsForm = reactive(defaultStepsForm());

        const stepsRules1 = {
          name: [{ required: true, message: '请输入名称', trigger: 'blur' }],
          type: [{ required: true, message: '请选择类型', trigger: 'change' }],
        };

        /* ---- 状态映射 ---- */
        function statusTagType(status) {
          const map = { active: 'success', disabled: 'danger', draft: 'warning' };
          return map[status] || 'info';
        }

        function statusLabel(status) {
          const map = { active: '启用', disabled: '禁用', draft: '草稿' };
          return map[status] || status;
        }

        /* ---- 普通弹框事件 ---- */
        function handleAdd() {
          dialogMode.value = 'add';
          Object.assign(formData, defaultFormData());
          dialogVisible.value = true;
        }

        function handleEdit(row) {
          dialogMode.value = 'edit';
          Object.assign(formData, { id: row.id, name: row.name, type: row.type, description: row.description || '', date: row.date || '', status: row.status });
          dialogVisible.value = true;
        }

        async function handleSubmit() {
          if (!formRef.value) return;
          try { await formRef.value.validate(); } catch { return; }
          submitLoading.value = true;
          try {
            await new Promise(r => setTimeout(r, 600));
            ElementPlus.ElMessage.success((dialogMode.value === 'add' ? '新增' : '编辑') + '成功');
            dialogVisible.value = false;
          } catch { ElementPlus.ElMessage.error('操作失败'); }
          finally { submitLoading.value = false; }
        }

        function handleDialogClosed() {
          if (formRef.value) formRef.value.resetFields();
        }

        /* ---- 分步弹框事件 ---- */
        function handleStepsAdd() {
          Object.assign(stepsForm, defaultStepsForm());
          stepsActive.value = 0;
          stepsDialogVisible.value = true;
        }

        async function handleStepsNext() {
          if (stepsActive.value === 0 && stepsForm1Ref.value) {
            try { await stepsForm1Ref.value.validate(); } catch { return; }
          }
          stepsActive.value++;
        }

        function handleStepsSubmit() {
          ElementPlus.ElMessage.success('分步新增成功');
          stepsDialogVisible.value = false;
        }

        function resetStepsForm() {
          stepsActive.value = 0;
        }

        /* ---- 通用事件 ---- */
        function handleDelete(row) {
          ElementPlus.ElMessageBox.confirm('确定删除「' + row.name + '」？删除后无法恢复。', '确认删除', { confirmButtonText: '删除', cancelButtonText: '取消', type: 'warning' })
            .then(() => { ElementPlus.ElMessage.success('已删除：' + row.name); }).catch(() => {});
        }

        function handleSearch() {
          ElementPlus.ElMessage.success('查询条件：' + JSON.stringify({ keyword: filterForm.keyword, status: filterForm.status }));
        }

        function handleReset() {
          filterForm.keyword = '';
          filterForm.status = '';
          pagination.page = 1;
          ElementPlus.ElMessage.info('已重置筛选条件');
        }

        function handlePageChange() {}

        return {
          filterForm, loading, pagination, total, tableData,
          dialogVisible, dialogMode, dialogTitle, submitLoading, formRef, formData, formRules,
          stepsDialogVisible, stepsActive, stepsForm1Ref, stepsForm, stepsRules1,
          statusTagType, statusLabel,
          handleAdd, handleEdit, handleSubmit, handleDialogClosed,
          handleStepsAdd, handleStepsNext, handleStepsSubmit, resetStepsForm,
          handleDelete, handleSearch, handleReset, handlePageChange,
        };
      },
    });

    app.use(ElementPlus, { locale: zhCn });
    for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
      app.component(key, component);
    }
    app.mount('#app');
  </script>
</body>
</html>
