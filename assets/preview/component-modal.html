<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal 对话框</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.8.5/dist/index.css">
  <style>
    :root {
      --color-primary: #1764E8;
      --color-success: #67C23A;
      --color-warning: #E6A23C;
      --color-danger: #F56C6C;
      --text-primary: rgba(0, 0, 0, 0.85);
      --text-secondary: rgba(0, 0, 0, 0.65);
      --text-muted: rgba(0, 0, 0, 0.45);
      --page-bg: #f5f7fa;
      --card-bg: #fff;
      --font-stack: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-stack);
      background: var(--page-bg);
      color: var(--text-primary);
      padding: 40px;
    }

    .page-header {
      margin-bottom: 32px;
    }

    .page-header h1 {
      font-size: 28px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .page-header p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .section {
      background: var(--card-bg);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .section-title {
      position: relative;
      margin: 0 0 12px 14px;
      font-size: 16px;
      font-weight: 500;
      color: rgba(0, 0, 0, 0.85);
    }

    .section-title::after {
      content: '';
      position: absolute;
      top: 50%;
      left: -12px;
      transform: translateY(-50%);
      width: 4px;
      height: 16px;
      background-color: #1764e8;
      border-top: 4px solid #C9D8F2;
      border-bottom: 4px solid #C9D8F2;
    }

    .demo-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .demo-group {
      margin-bottom: 24px;
    }

    .demo-group:last-child {
      margin-bottom: 0;
    }

    .demo-label {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="page-header">
      <h1>Modal 对话框</h1>
      <p>在不离开当前页面的前提下，承载信息确认、表单填写等交互任务。</p>
    </div>

    <!-- 基础弹框 -->
    <div class="section-title">基础弹框</div>
    <div class="section">
      <div class="demo-row">
        <el-button type="primary" @click="dialogVisible1 = true">打开基础弹框</el-button>
      </div>
      <el-dialog v-model="dialogVisible1" title="基础弹框" width="500">
        <p>这是一段基础对话框的内容，可以放置文字、表单等任意内容。</p>
        <template #footer>
          <div class="dialog-footer">
            <el-button @click="dialogVisible1 = false">取消</el-button>
            <el-button type="primary" @click="dialogVisible1 = false">确认</el-button>
          </div>
        </template>
      </el-dialog>
    </div>

    <!-- 自定义标题 -->
    <div class="section-title">自定义标题</div>
    <div class="section">
      <div class="demo-row">
        <el-button type="primary" @click="dialogVisible2 = true">自定义标题弹框</el-button>
      </div>
      <el-dialog v-model="dialogVisible2" width="500">
        <template #header>
          <div style="display: flex; align-items: center; gap: 8px;">
            <el-icon color="var(--color-warning)"><WarningFilled></WarningFilled></el-icon>
            <span style="font-size: 16px; font-weight: 500;">操作确认</span>
          </div>
        </template>
        <p>这是一个带有自定义标题的对话框，标题中包含图标。</p>
        <template #footer>
          <div class="dialog-footer">
            <el-button @click="dialogVisible2 = false">取消</el-button>
            <el-button type="primary" @click="dialogVisible2 = false">确认</el-button>
          </div>
        </template>
      </el-dialog>
    </div>

    <!-- 嵌套表单弹框 -->
    <div class="section-title">嵌套表单弹框</div>
    <div class="section">
      <div class="demo-row">
        <el-button type="primary" @click="dialogVisible3 = true">打开表单弹框</el-button>
      </div>
      <el-dialog v-model="dialogVisible3" title="新建服务" width="520">
        <el-form :model="form" label-width="100px">
          <el-form-item label="服务名称" required>
            <el-input v-model="form.name" placeholder="请输入服务名称"></el-input>
          </el-form-item>
          <el-form-item label="服务类型">
            <el-select v-model="form.type" placeholder="请选择服务类型" style="width: 100%;">
              <el-option label="核心服务" value="core"></el-option>
              <el-option label="业务服务" value="biz"></el-option>
              <el-option label="基础设施" value="infra"></el-option>
            </el-select>
          </el-form-item>
          <el-form-item label="负责人">
            <el-input v-model="form.owner" placeholder="请输入负责人姓名"></el-input>
          </el-form-item>
          <el-form-item label="优先级">
            <el-radio-group v-model="form.priority">
              <el-radio value="high">高</el-radio>
              <el-radio value="medium">中</el-radio>
              <el-radio value="low">低</el-radio>
            </el-radio-group>
          </el-form-item>
          <el-form-item label="描述">
            <el-input v-model="form.desc" type="textarea" :rows="2" placeholder="请输入服务描述"></el-input>
          </el-form-item>
        </el-form>
        <template #footer>
          <div class="dialog-footer">
            <el-button @click="dialogVisible3 = false">取消</el-button>
            <el-button type="primary" @click="dialogVisible3 = false">确定</el-button>
          </div>
        </template>
      </el-dialog>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus@2.8.5/dist/index.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@element-plus/icons-vue@2.3.1/dist/index.iife.min.js"></script>
  <script>
    const { createApp, ref, reactive } = Vue;

    const app = createApp({
      setup() {
        const dialogVisible1 = ref(false);
        const dialogVisible2 = ref(false);
        const dialogVisible3 = ref(false);

        const form = reactive({
          name: '',
          type: '',
          owner: '',
          priority: 'medium',
          desc: ''
        });

        return {
          dialogVisible1,
          dialogVisible2,
          dialogVisible3,
          form
        };
      }
    });

    for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
      app.component(key, component);
    }

    const zhCn = {
      name: 'zh-cn',
      el: {
        pagination: { goto: '前往', pagesize: '条/页', total: '共 {total} 条', pageClassifier: '页', page: '页', prev: '上一页', next: '下一页', currentPage: '第 {pager} 页' },
        select: { loading: '加载中', noMatch: '无匹配数据', noData: '暂无数据', placeholder: '请选择' },
        table: { emptyText: '暂无数据', confirmFilter: '确认', resetFilter: '重置', clearFilter: '全部', sumText: '合计' },
        pageHeader: { title: '返回' },
        datepicker: { now: '此刻', today: '今天', cancel: '取消', clear: '清空', confirm: '确定', startDate: '开始日期', startTime: '开始时间', endDate: '结束日期', endTime: '结束时间', prevYear: '前一年', nextYear: '后一年', prevMonth: '上个月', nextMonth: '下个月', year: '年', month1: '1月', month2: '2月', month3: '3月', month4: '4月', month5: '5月', month6: '6月', month7: '7月', month8: '8月', month9: '9月', month10: '10月', month11: '11月', month12: '12月', weeks: { sun: '日', mon: '一', tue: '二', wed: '三', thu: '四', fri: '五', sat: '六' }, months: { jan: '一月', feb: '二月', mar: '三月', apr: '四月', may: '五月', jun: '六月', jul: '七月', aug: '八月', sep: '九月', oct: '十月', nov: '十一月', dec: '十二月' } }
      }
    };    app.use(ElementPlus, { locale: zhCn });
    app.mount('#app');
  </script>
</body>
</html>
