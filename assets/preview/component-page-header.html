<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PageHeader 页头</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.8.5/dist/index.css">
  <script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus@2.8.5/dist/index.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@element-plus/icons-vue@2.3.1/dist/index.iife.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus@2.8.5/dist/locale/zh-cn.min.js"></script>
  <style>
    :root {
      --color-primary: #1764E8;
      --color-success: #67C23A;
      --color-warning: #E6A23C;
      --color-danger: #F56C6C;
      --text-primary: rgba(0, 0, 0, 0.85);
      --text-secondary: rgba(0, 0, 0, 0.65);
      --text-muted: rgba(0, 0, 0, 0.45);
      --page-bg: #f5f7fa;
      --card-bg: #fff;
      --font-stack: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-stack);
      background: var(--page-bg);
      color: var(--text-primary);
      padding: 24px;
    }
    .pv-header {
      margin-bottom: 32px;
    }
    .pv-header h1 {
      font-size: 24px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .pv-header p {
      font-size: 14px;
      color: var(--text-secondary);
    }
    .pv-section {
      margin-bottom: 32px;
    }
    .section-title {
      position: relative;
      margin: 0 0 12px 14px;
      font-size: 16px;
      font-weight: 500;
      color: rgba(0, 0, 0, 0.85);
    }
    .section-title::after {
      content: '';
      position: absolute;
      top: 50%;
      left: -12px;
      transform: translateY(-50%);
      width: 4px;
      height: 16px;
      background-color: #1764e8;
      border-top: 4px solid #C9D8F2;
      border-bottom: 4px solid #C9D8F2;
    }
    .demo-box {
      background: var(--card-bg);
      border-radius: 8px;
      padding: 24px;
      border: 1px solid rgba(0, 0, 0, 0.06);
    }
    .stack-12 {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .page-header-custom {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .page-header-custom .left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .page-header-custom .title-area {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .page-header-custom .title-area h2 {
      font-size: 18px;
      font-weight: 500;
      color: var(--text-primary);
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="pv-header">
      <h1>PageHeader 页头</h1>
      <p>页面标题组件，基于 Element Plus el-page-header 实现，支持面包屑和自定义内容插槽。</p>
    </div>

    <!-- 变体 1: 基础页头 -->
    <div class="pv-section">
      <div class="section-title">基础页头</div>
      <div class="stack-12">
        <div class="demo-box">
          <el-page-header content="详情页" @back="goBack1">
            <template #icon>
              <el-icon><component :is="'ArrowLeft'"></component></el-icon>
            </template>
          </el-page-header>
        </div>
      </div>
    </div>

    <!-- 变体 2: 带面包屑 -->
    <div class="pv-section">
      <div class="section-title">带面包屑</div>
      <div class="stack-12">
        <div class="demo-box">
          <el-page-header @back="goBack2">
            <template #content>
              <el-breadcrumb separator="/">
                <el-breadcrumb-item>云服务器 ECS</el-breadcrumb-item>
                <el-breadcrumb-item>实例列表</el-breadcrumb-item>
                <el-breadcrumb-item>详情</el-breadcrumb-item>
              </el-breadcrumb>
            </template>
          </el-page-header>
        </div>
      </div>
    </div>

    <!-- 变体 3: 自定义内容 -->
    <div class="pv-section">
      <div class="section-title">自定义内容</div>
      <div class="stack-12">
        <div class="demo-box">
          <el-page-header @back="goBack3">
            <template #content>
              <div class="page-header-custom">
                <div class="left">
                  <div class="title-area">
                    <h2>网关设备-A1</h2>
                    <el-tag type="success" effect="light" size="small">
                      <el-icon style="margin-right: 2px;"><component :is="'CircleCheckFilled'"></component></el-icon>
                      正常运行
                    </el-tag>
                  </div>
                </div>
              </div>
            </template>
            <template #extra>
              <div>
                <el-button size="small">远程连接</el-button>
                <el-button size="small">刷新</el-button>
              </div>
            </template>
          </el-page-header>
        </div>
        <div class="demo-box">
          <el-page-header @back="goBack3">
            <template #content>
              <div class="page-header-custom">
                <div class="left">
                  <div class="title-area">
                    <h2>实例详情</h2>
                    <el-tag type="warning" effect="light" size="small">
                      <el-icon style="margin-right: 2px;"><component :is="'WarningFilled'"></component></el-icon>
                      告警中
                    </el-tag>
                  </div>
                </div>
              </div>
            </template>
            <template #extra>
              <div>
                <el-button size="small" type="primary">编辑</el-button>
                <el-button size="small" type="danger" plain>停用</el-button>
              </div>
            </template>
          </el-page-header>
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref } = Vue;
    const app = createApp({
      setup() {
        const goBack1 = () => { /* 返回上一页 */ };
        const goBack2 = () => { /* 返回上一页 */ };
        const goBack3 = () => { /* 返回上一页 */ };
        return {
          goBack1,
          goBack2,
          goBack3,
        };
      }
    });
    for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
      app.component(key, component);
    }
    const zhCn = {
      name: 'zh-cn',
      el: {
        pagination: { goto: '前往', pagesize: '条/页', total: '共 {total} 条', pageClassifier: '页', page: '页', prev: '上一页', next: '下一页', currentPage: '第 {pager} 页' },
        select: { loading: '加载中', noMatch: '无匹配数据', noData: '暂无数据', placeholder: '请选择' },
        table: { emptyText: '暂无数据', confirmFilter: '确认', resetFilter: '重置', clearFilter: '全部', sumText: '合计' },
        pageHeader: { title: '返回' },
        datepicker: { now: '此刻', today: '今天', cancel: '取消', clear: '清空', confirm: '确定', startDate: '开始日期', startTime: '开始时间', endDate: '结束日期', endTime: '结束时间', prevYear: '前一年', nextYear: '后一年', prevMonth: '上个月', nextMonth: '下个月', year: '年', month1: '1月', month2: '2月', month3: '3月', month4: '4月', month5: '5月', month6: '6月', month7: '7月', month8: '8月', month9: '9月', month10: '10月', month11: '11月', month12: '12月', weeks: { sun: '日', mon: '一', tue: '二', wed: '三', thu: '四', fri: '五', sat: '六' }, months: { jan: '一月', feb: '二月', mar: '三月', apr: '四月', may: '五月', jun: '六月', jul: '七月', aug: '八月', sep: '九月', oct: '十月', nov: '十一月', dec: '十二月' } }
      }
    };    app.use(ElementPlus, { locale: zhCn });
    app.mount('#app');
  </script>
</body>
</html>
