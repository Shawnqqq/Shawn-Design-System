<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Tag 标签</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.8.5/dist/index.css">
  <script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus@2.8.5/dist/index.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus@2.8.5/dist/locale/zh-cn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@element-plus/icons-vue@2.3.1/dist/index.iife.min.js"></script>
  <style>
    :root {
      --color-primary: #1764E8;
      --color-success: #67C23A;
      --color-warning: #E6A23C;
      --color-danger: #F56C6C;
      --text-primary: rgba(0, 0, 0, 0.85);
      --text-secondary: rgba(0, 0, 0, 0.65);
      --text-muted: rgba(0, 0, 0, 0.45);
      --page-bg: #f5f7fa;
      --card-bg: #fff;
      --font-stack: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-stack);
      background: var(--page-bg);
      color: var(--text-primary);
      padding: 32px;
      min-height: 100vh;
    }

    .page-header {
      margin-bottom: 32px;
    }

    .page-header h1 {
      font-size: 28px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .page-header p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .section {
      background: var(--card-bg);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .section-title {
      position: relative;
      margin: 0 0 12px 14px;
      font-size: 16px;
      font-weight: 500;
      color: rgba(0, 0, 0, 0.85);
    }

    .section-title::after {
      content: '';
      position: absolute;
      top: 50%;
      left: -12px;
      transform: translateY(-50%);
      width: 4px;
      height: 16px;
      background-color: #1764e8;
      border-top: 4px solid #C9D8F2;
      border-bottom: 4px solid #C9D8F2;
    }

    .demo-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .demo-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .demo-group {
      margin-bottom: 20px;
    }

    .demo-group:last-child {
      margin-bottom: 0;
    }

    .el-tag--large {
      height: 28px;
      line-height: 26px;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="page-header">
      <h1>Tag 标签</h1>
      <p>用于标记和选择的标签组件。</p>
    </div>

    <!-- 按颜色 -->
    <div class="section-title">按颜色</div>
    <div class="section">
      <div class="demo-row">
        <el-tag>默认</el-tag>
        <el-tag type="success">成功</el-tag>
        <el-tag type="warning">警告</el-tag>
        <el-tag type="danger">危险</el-tag>
        <el-tag type="info">信息</el-tag>
      </div>
    </div>

    <!-- 按尺寸 -->
    <div class="section-title">按尺寸</div>
    <div class="section">
      <div class="demo-row">
        <div class="demo-group">
          <div class="demo-label">Large（28px）</div>
          <div class="demo-row">
            <el-tag size="large" class="el-tag--large">大号标签</el-tag>
            <el-tag size="large" class="el-tag--large" type="success">成功</el-tag>
            <el-tag size="large" class="el-tag--large" type="warning">警告</el-tag>
          </div>
        </div>
      </div>
      <div class="demo-row" style="margin-top: 16px;">
        <div class="demo-group">
          <div class="demo-label">Default（默认）</div>
          <div class="demo-row">
            <el-tag>默认标签</el-tag>
            <el-tag type="success">成功</el-tag>
            <el-tag type="warning">警告</el-tag>
          </div>
        </div>
      </div>
      <div class="demo-row" style="margin-top: 16px;">
        <div class="demo-group">
          <div class="demo-label">Small（小号）</div>
          <div class="demo-row">
            <el-tag size="small">小号标签</el-tag>
            <el-tag size="small" type="success">成功</el-tag>
            <el-tag size="small" type="warning">警告</el-tag>
          </div>
        </div>
      </div>
    </div>

    <!-- 按效果 -->
    <div class="section-title">按效果</div>
    <div class="section">

      <div class="demo-group">
        <div class="demo-label">dark 效果</div>
        <div class="demo-row">
          <el-tag effect="dark">默认</el-tag>
          <el-tag effect="dark" type="success">成功</el-tag>
          <el-tag effect="dark" type="warning">警告</el-tag>
          <el-tag effect="dark" type="danger">危险</el-tag>
          <el-tag effect="dark" type="info">信息</el-tag>
        </div>
      </div>

      <div class="demo-group">
        <div class="demo-label">light 效果</div>
        <div class="demo-row">
          <el-tag effect="light">默认</el-tag>
          <el-tag effect="light" type="success">成功</el-tag>
          <el-tag effect="light" type="warning">警告</el-tag>
          <el-tag effect="light" type="danger">危险</el-tag>
          <el-tag effect="light" type="info">信息</el-tag>
        </div>
      </div>

      <div class="demo-group">
        <div class="demo-label">plain 效果</div>
        <div class="demo-row">
          <el-tag effect="plain">默认</el-tag>
          <el-tag effect="plain" type="success">成功</el-tag>
          <el-tag effect="plain" type="warning">警告</el-tag>
          <el-tag effect="plain" type="danger">危险</el-tag>
          <el-tag effect="plain" type="info">信息</el-tag>
        </div>
      </div>
    </div>

    <!-- 可关闭标签 -->
    <div class="section-title">可关闭标签</div>
    <div class="section">
      <div class="tag-list">
        <el-tag
          v-for="tag in dynamicTags"
          :key="tag.name"
          closable
          :type="tag.type"
          @close="handleClose(tag)"
        >
          {{ tag.name }}
        </el-tag>
      </div>
      <div style="margin-top: 12px;">
        <el-input
          v-model="inputValue"
          size="small"
          style="width: 160px; margin-right: 8px;"
          placeholder="输入标签名"
          @keyup.enter="handleInputConfirm"
        ></el-input>
        <el-button size="small" @click="handleInputConfirm">添加标签</el-button>
      </div>
    </div>

    <!-- 圆角标签 -->
    <div class="section-title">圆角标签</div>
    <div class="section">
      <div class="demo-row">
        <el-tag round>默认</el-tag>
        <el-tag round type="success">成功</el-tag>
        <el-tag round type="warning">警告</el-tag>
        <el-tag round type="danger">危险</el-tag>
        <el-tag round type="info">信息</el-tag>
      </div>
    </div>

    <!-- 暗色标签 -->
    <div class="section-title">暗色标签</div>
    <div class="section">
      <div class="demo-row">
        <el-tag effect="dark">默认</el-tag>
        <el-tag effect="dark" type="success">成功</el-tag>
        <el-tag effect="dark" type="warning">警告</el-tag>
        <el-tag effect="dark" type="danger">危险</el-tag>
        <el-tag effect="dark" type="info">信息</el-tag>
      </div>
      <div class="demo-row" style="margin-top: 12px;">
        <el-tag effect="dark" round>默认圆角</el-tag>
        <el-tag effect="dark" round type="success">成功圆角</el-tag>
        <el-tag effect="dark" round type="warning">警告圆角</el-tag>
        <el-tag effect="dark" round type="danger">危险圆角</el-tag>
        <el-tag effect="dark" round type="info">信息圆角</el-tag>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref } = Vue;

    const app = createApp({
      setup() {
        const dynamicTags = ref([
          { name: '标签一', type: '' },
          { name: '标签二', type: 'success' },
          { name: '标签三', type: 'warning' },
          { name: '标签四', type: 'danger' },
          { name: '标签五', type: 'info' },
        ]);

        const inputValue = ref('');

        const handleClose = (tag) => {
          const index = dynamicTags.value.indexOf(tag);
          if (index !== -1) {
            dynamicTags.value.splice(index, 1);
          }
        };

        const handleInputConfirm = () => {
          if (inputValue.value) {
            dynamicTags.value.push({
              name: inputValue.value,
              type: '',
            });
          }
          inputValue.value = '';
        };

        return {
          dynamicTags,
          inputValue,
          handleClose,
          handleInputConfirm,
        };
      }
    });

    const zhCn = {
      name: 'zh-cn',
      el: {
        pagination: { goto: '前往', pagesize: '条/页', total: '共 {total} 条', pageClassifier: '页', page: '页', prev: '上一页', next: '下一页', currentPage: '第 {pager} 页' },
        select: { loading: '加载中', noMatch: '无匹配数据', noData: '暂无数据', placeholder: '请选择' },
        table: { emptyText: '暂无数据', confirmFilter: '确认', resetFilter: '重置', clearFilter: '全部', sumText: '合计' },
        pageHeader: { title: '返回' },
        datepicker: { now: '此刻', today: '今天', cancel: '取消', clear: '清空', confirm: '确定', startDate: '开始日期', startTime: '开始时间', endDate: '结束日期', endTime: '结束时间', prevYear: '前一年', nextYear: '后一年', prevMonth: '上个月', nextMonth: '下个月', year: '年', month1: '1月', month2: '2月', month3: '3月', month4: '4月', month5: '5月', month6: '6月', month7: '7月', month8: '8月', month9: '9月', month10: '10月', month11: '11月', month12: '12月', weeks: { sun: '日', mon: '一', tue: '二', wed: '三', thu: '四', fri: '五', sat: '六' }, months: { jan: '一月', feb: '二月', mar: '三月', apr: '四月', may: '五月', jun: '六月', jul: '七月', aug: '八月', sep: '九月', oct: '十月', nov: '十一月', dec: '十二月' } }
      }
    };    app.use(ElementPlus, { locale: zhCn });

    if (window.ElementPlusIconsVue) {
      for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
        app.component(key, component);
      }
    }

    app.mount('#app');
  </script>
</body>
</html>
