<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Select 选择器</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.8.5/dist/index.css">
  <script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus@2.8.5/dist/index.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus@2.8.5/dist/locale/zh-cn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@element-plus/icons-vue@2.3.1/dist/index.iife.min.js"></script>
  <style>
    :root {
      --color-primary: #1764E8;
      --color-success: #67C23A;
      --color-warning: #E6A23C;
      --color-danger: #F56C6C;
      --text-primary: rgba(0, 0, 0, 0.85);
      --text-secondary: rgba(0, 0, 0, 0.65);
      --text-muted: rgba(0, 0, 0, 0.45);
      --page-bg: #f5f7fa;
      --card-bg: #fff;
      --font-stack: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-stack);
      background: var(--page-bg);
      color: var(--text-primary);
      padding: 32px;
      min-height: 100vh;
    }

    .page-header {
      margin-bottom: 32px;
    }

    .page-header h1 {
      font-size: 28px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .page-header p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .section {
      background: var(--card-bg);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .section-title {
      position: relative;
      margin: 0 0 12px 14px;
      font-size: 16px;
      font-weight: 500;
      color: rgba(0, 0, 0, 0.85);
    }

    .section-title::after {
      content: '';
      position: absolute;
      top: 50%;
      left: -12px;
      transform: translateY(-50%);
      width: 4px;
      height: 16px;
      background-color: #1764e8;
      border-top: 4px solid #C9D8F2;
      border-bottom: 4px solid #C9D8F2;
    }

    .demo-row {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      align-items: flex-start;
    }

    .demo-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .demo-label {
      font-size: 13px;
      color: var(--text-muted);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="page-header">
      <h1>Select 选择器</h1>
      <p>当选项过多时，使用下拉菜单展示并选择内容。</p>
    </div>

    <!-- 基础选择器 -->
    <div class="section-title">基础选择器</div>
    <div class="section">
      <div class="demo-row">
        <div class="demo-item">
          <span class="demo-label">无默认值</span>
          <el-select v-model="basicEmpty" placeholder="请选择城市" style="width: 220px;">
            <el-option
              v-for="city in cities"
              :key="city.value"
              :label="city.label"
              :value="city.value"
            ></el-option>
          </el-select>
        </div>
        <div class="demo-item">
          <span class="demo-label">有默认值</span>
          <el-select v-model="basicDefault" placeholder="请选择城市" style="width: 220px;">
            <el-option
              v-for="city in cities"
              :key="city.value"
              :label="city.label"
              :value="city.value"
            ></el-option>
          </el-select>
        </div>
        <div class="demo-item">
          <span class="demo-label">禁用状态</span>
          <el-select v-model="basicDisabled" disabled placeholder="请选择城市" style="width: 220px;">
            <el-option
              v-for="city in cities"
              :key="city.value"
              :label="city.label"
              :value="city.value"
            ></el-option>
          </el-select>
        </div>
        <div class="demo-item">
          <span class="demo-label">禁用（已选值）</span>
          <el-select v-model="basicDisabledVal" disabled style="width: 220px;">
            <el-option
              v-for="city in cities"
              :key="city.value"
              :label="city.label"
              :value="city.value"
            ></el-option>
          </el-select>
        </div>
      </div>
    </div>

    <!-- 带标签 -->
    <div class="section-title">带标签</div>
    <div class="section">
      <div class="form-row">
        <el-form label-width="80px">
          <el-form-item label="部门选择">
            <el-select v-model="formDept" placeholder="请选择部门" style="width: 100%;">
              <el-option
                v-for="dept in departments"
                :key="dept.value"
                :label="dept.label"
                :value="dept.value"
              ></el-option>
            </el-select>
          </el-form-item>
          <el-form-item label="优先级">
            <el-select v-model="formPriority" placeholder="请选择优先级" style="width: 100%;">
              <el-option label="紧急" value="urgent"></el-option>
              <el-option label="高" value="high"></el-option>
              <el-option label="中" value="medium"></el-option>
              <el-option label="低" value="low"></el-option>
            </el-select>
          </el-form-item>
        </el-form>
      </div>
    </div>

    <!-- 多选 -->
    <div class="section-title">多选</div>
    <div class="section">
      <div class="demo-row">
        <div class="demo-item">
          <span class="demo-label">multiple 多选</span>
          <el-select
            v-model="multiValue"
            multiple
            placeholder="请选择城市"
            style="width: 320px;"
          >
            <el-option
              v-for="city in cities"
              :key="city.value"
              :label="city.label"
              :value="city.value"
            ></el-option>
          </el-select>
        </div>
        <div class="demo-item">
          <span class="demo-label">collapse-tags 折叠标签</span>
          <el-select
            v-model="multiCollapse"
            multiple
            collapse-tags
            collapse-tags-tooltip
            placeholder="请选择城市"
            style="width: 320px;"
          >
            <el-option
              v-for="city in cities"
              :key="city.value"
              :label="city.label"
              :value="city.value"
            ></el-option>
          </el-select>
        </div>
      </div>
    </div>

    <!-- 可搜索 -->
    <div class="section-title">可搜索</div>
    <div class="section">
      <div class="demo-row">
        <div class="demo-item">
          <span class="demo-label">filterable 单选搜索</span>
          <el-select
            v-model="searchSingle"
            filterable
            placeholder="搜索并选择城市"
            style="width: 280px;"
          >
            <el-option
              v-for="city in cities"
              :key="city.value"
              :label="city.label"
              :value="city.value"
            ></el-option>
          </el-select>
        </div>
        <div class="demo-item">
          <span class="demo-label">filterable + multiple 搜索多选</span>
          <el-select
            v-model="searchMulti"
            filterable
            multiple
            placeholder="搜索并选择部门"
            style="width: 360px;"
          >
            <el-option
              v-for="dept in departments"
              :key="dept.value"
              :label="dept.label"
              :value="dept.value"
            ></el-option>
          </el-select>
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref } = Vue;

    const app = createApp({
      setup() {
        const cities = [
          { label: '北京', value: 'beijing' },
          { label: '上海', value: 'shanghai' },
          { label: '广州', value: 'guangzhou' },
          { label: '深圳', value: 'shenzhen' },
          { label: '杭州', value: 'hangzhou' },
          { label: '成都', value: 'chengdu' },
          { label: '南京', value: 'nanjing' },
          { label: '武汉', value: 'wuhan' },
        ];

        const departments = [
          { label: '技术部', value: 'tech' },
          { label: '产品部', value: 'product' },
          { label: '设计部', value: 'design' },
          { label: '市场部', value: 'market' },
          { label: '运营部', value: 'ops' },
          { label: '人力资源部', value: 'hr' },
          { label: '财务部', value: 'finance' },
          { label: '法务部', value: 'legal' },
        ];

        return {
          cities,
          departments,
          basicEmpty: ref(''),
          basicDefault: ref('hangzhou'),
          basicDisabled: ref(''),
          basicDisabledVal: ref('beijing'),
          formDept: ref(''),
          formPriority: ref(''),
          multiValue: ref(['beijing', 'shanghai']),
          multiCollapse: ref(['beijing', 'shanghai', 'guangzhou', 'shenzhen', 'hangzhou']),
          searchSingle: ref(''),
          searchMulti: ref([]),
        };
      }
    });

    const zhCn = {
      name: 'zh-cn',
      el: {
        pagination: { goto: '前往', pagesize: '条/页', total: '共 {total} 条', pageClassifier: '页', page: '页', prev: '上一页', next: '下一页', currentPage: '第 {pager} 页' },
        select: { loading: '加载中', noMatch: '无匹配数据', noData: '暂无数据', placeholder: '请选择' },
        table: { emptyText: '暂无数据', confirmFilter: '确认', resetFilter: '重置', clearFilter: '全部', sumText: '合计' },
        pageHeader: { title: '返回' },
        datepicker: { now: '此刻', today: '今天', cancel: '取消', clear: '清空', confirm: '确定', startDate: '开始日期', startTime: '开始时间', endDate: '结束日期', endTime: '结束时间', prevYear: '前一年', nextYear: '后一年', prevMonth: '上个月', nextMonth: '下个月', year: '年', month1: '1月', month2: '2月', month3: '3月', month4: '4月', month5: '5月', month6: '6月', month7: '7月', month8: '8月', month9: '9月', month10: '10月', month11: '11月', month12: '12月', weeks: { sun: '日', mon: '一', tue: '二', wed: '三', thu: '四', fri: '五', sat: '六' }, months: { jan: '一月', feb: '二月', mar: '三月', apr: '四月', may: '五月', jun: '六月', jul: '七月', aug: '八月', sep: '九月', oct: '十月', nov: '十一月', dec: '十二月' } }
      }
    };    app.use(ElementPlus, { locale: zhCn });

    if (window.ElementPlusIconsVue) {
      for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
        app.component(key, component);
      }
    }

    app.mount('#app');
  </script>
</body>
</html>
