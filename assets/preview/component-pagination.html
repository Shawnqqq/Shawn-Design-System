<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagination 分页</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.8.5/dist/index.css">
  <style>
    :root {
      --color-primary: #1764E8;
      --color-success: #67C23A;
      --color-warning: #E6A23C;
      --color-danger: #F56C6C;
      --text-primary: rgba(0, 0, 0, 0.85);
      --text-secondary: rgba(0, 0, 0, 0.65);
      --text-muted: rgba(0, 0, 0, 0.45);
      --page-bg: #f5f7fa;
      --card-bg: #fff;
      --table-header-bg: #fafafa;
      --font-stack: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-stack);
      background: var(--page-bg);
      color: var(--text-primary);
      padding: 32px;
      line-height: 1.6;
    }

    .page-header {
      margin-bottom: 32px;
    }

    .page-header h1 {
      font-size: 28px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .page-header p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .section {
      margin-bottom: 32px;
    }

    .section-title {
      position: relative;
      margin: 0 0 12px 14px;
      font-size: 16px;
      font-weight: 500;
      color: rgba(0, 0, 0, 0.85);
    }

    .section-title::after {
      content: '';
      position: absolute;
      top: 50%;
      left: -12px;
      transform: translateY(-50%);
      width: 4px;
      height: 16px;
      background-color: #1764e8;
      border-top: 4px solid #C9D8F2;
      border-bottom: 4px solid #C9D8F2;
    }

    .demo-card {
      background: var(--card-bg);
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
    }

    .demo-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 12px;
    }

    .demo-item {
      margin-bottom: 24px;
    }

    .demo-item:last-child {
      margin-bottom: 0;
    }

    .pagination-with-total {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .pagination-total-text {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Element Plus pagination font size override */
    .el-pagination {
      --el-pagination-font-size: 12px;
    }

    .el-pagination .el-pagination__jump .el-input {
      width: 80px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="page-header">
      <h1>Pagination 分页</h1>
      <p>分页导航组件，支持多种布局模式，含标准分页、简洁分页、带总数显示等变体。</p>
    </div>

    <!-- 标准分页 -->
    <div class="section-title">标准分页</div>
    <div class="section">
      <div class="demo-card">
        <div class="demo-item">
          <div class="demo-label">完整模式（条数选择 + 页码 + 跳转）</div>
          <el-pagination
            v-model:current-page="currentPage1"
            v-model:page-size="pageSize1"
            :page-sizes="[20, 50, 100, 200, 500]"
            :total="326"
            layout="sizes, prev, pager, next, jumper"
            background
          />
        </div>
      </div>
    </div>

    <!-- 简洁分页 -->
    <div class="section-title">简洁分页</div>
    <div class="section">
      <div class="demo-card">
        <div class="demo-item">
          <el-pagination
            v-model:current-page="currentPage2"
            :total="326"
            :page-size="50"
            layout="prev, pager, next"
            background
          />
        </div>
      </div>
    </div>

    <!-- 带总数 -->
    <div class="section-title">带总数</div>
    <div class="section">
      <div class="demo-card">
        <div class="demo-item">
          <div class="pagination-with-total">
            <span class="pagination-total-text">共 326 条</span>
            <el-pagination
              v-model:current-page="currentPage3"
              :total="326"
              :page-size="50"
              layout="prev, pager, next"
              background
            />
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus@2.8.5/dist/index.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@element-plus/icons-vue@2.3.1/dist/index.iife.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus@2.8.5/dist/locale/zh-cn.min.js"></script>
  <script>
    const { createApp, ref } = Vue;

    const app = createApp({
      setup() {
        return {
          currentPage1: ref(1),
          pageSize1: ref(50),
          currentPage2: ref(1),
          currentPage3: ref(1),
        };
      }
    });

    const zhCn = {
      name: 'zh-cn',
      el: {
        pagination: { goto: '前往', pagesize: '条/页', total: '共 {total} 条', pageClassifier: '页', page: '页', prev: '上一页', next: '下一页', currentPage: '第 {pager} 页' },
        select: { loading: '加载中', noMatch: '无匹配数据', noData: '暂无数据', placeholder: '请选择' },
        table: { emptyText: '暂无数据', confirmFilter: '确认', resetFilter: '重置', clearFilter: '全部', sumText: '合计' },
        pageHeader: { title: '返回' },
        datepicker: { now: '此刻', today: '今天', cancel: '取消', clear: '清空', confirm: '确定', startDate: '开始日期', startTime: '开始时间', endDate: '结束日期', endTime: '结束时间', prevYear: '前一年', nextYear: '后一年', prevMonth: '上个月', nextMonth: '下个月', year: '年', month1: '1月', month2: '2月', month3: '3月', month4: '4月', month5: '5月', month6: '6月', month7: '7月', month8: '8月', month9: '9月', month10: '10月', month11: '11月', month12: '12月', weeks: { sun: '日', mon: '一', tue: '二', wed: '三', thu: '四', fri: '五', sat: '六' }, months: { jan: '一月', feb: '二月', mar: '三月', apr: '四月', may: '五月', jun: '六月', jul: '七月', aug: '八月', sep: '九月', oct: '十月', nov: '十一月', dec: '十二月' } }
      }
    };    app.use(ElementPlus, {
      locale: zhCn,
    });

    for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
      app.component(key, component);
    }

    app.mount('#app');
  </script>
</body>
</html>
