<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Form 表单</title>
  <link rel="stylesheet" href="preview-scaffold.css">
  <link rel="stylesheet" href="../colors_and_type.css">
  <link rel="stylesheet" href="../components.css">
  <style>
    .page { max-width: 780px;
      margin: 0 auto; }
  </style>
</head>
<body>
<!--
  ⚠️ CODE TEMPLATE — 本文件是代码模板，不是视觉参考。
  使用方法：找到需要的变体 → 原样复制 HTML（包括所有 class 名和 DOM 结构）→ 只修改文字和数据。
  禁止：用 Tailwind 重写、改变 class 命名、简化 DOM 结构、用自定义 class 替代。
-->
  <div class="pv-header">
    <h1>Form 表单</h1>
    <p>完整表单布局示例，包含单列、双列、校验态及分组表单。</p>
  </div>

  <div class="pv-section">
    <div class="pv-section__title">单列表单</div>
    <div class="demo-box">
      <div class="form-card">
        <h3 class="form-title">基本信息</h3>
        <form class="form" data-component="form" onsubmit="return false">
          <div class="form-field">
            <label class="form-label">姓名 <span class="required">*</span></label>
            <input type="text" class="ui-input" data-component="input" placeholder="请输入姓名">
          </div>
          <div class="form-field">
            <label class="form-label">邮箱 <span class="required">*</span></label>
            <input type="email" class="ui-input" data-component="input" placeholder="请输入邮箱">
            <span class="form-help">工作邮箱，用于接收通知</span>
          </div>
          <div class="form-field">
            <label class="form-label">部门</label>
            <select class="ui-select" data-component="select">
              <option value="" disabled selected>请选择部门</option>
              <option>技术部</option>
              <option>产品部</option>
              <option>设计部</option>
              <option>市场部</option>
            </select>
          </div>
          <div class="form-field">
            <label class="form-label">角色</label>
            <div class="radio-group" data-slot="control">
              <label class="radio"><input type="radio" name="role" checked><span>管理员</span></label>
              <label class="radio"><input type="radio" name="role"><span>编辑者</span></label>
              <label class="radio"><input type="radio" name="role"><span>查看者</span></label>
            </div>
          </div>
          <div class="form-field">
            <label class="form-label">备注</label>
            <textarea class="ui-textarea" rows="3" placeholder="请输入备注信息"></textarea>
          </div>
          <div class="form-actions" data-slot="actions">
            <button type="submit" class="btn btn-md btn-primary" data-component="button">提交</button>
            <button type="button" class="btn btn-md btn-secondary" data-component="button">取消</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="pv-section">
    <div class="pv-section__title">双列表单</div>
    <div class="demo-box">
      <div class="form-card">
        <h3 class="form-title">新建用户</h3>
        <form class="form" data-component="form" onsubmit="return false">
          <div class="form-grid-row">
            <div class="form-field">
              <label class="form-label">姓名 <span class="required">*</span></label>
              <input type="text" class="ui-input" data-component="input" placeholder="请输入姓名">
            </div>
            <div class="form-field">
              <label class="form-label">手机号 <span class="required">*</span></label>
              <input type="tel" class="ui-input" data-component="input" placeholder="请输入手机号">
            </div>
          </div>
          <div class="form-grid-row">
            <div class="form-field">
              <label class="form-label">邮箱</label>
              <input type="email" class="ui-input" data-component="input" placeholder="请输入邮箱">
            </div>
            <div class="form-field">
              <label class="form-label">职位</label>
              <input type="text" class="ui-input" data-component="input" placeholder="请输入职位">
            </div>
          </div>
          <div class="form-grid-row">
            <div class="form-field">
              <label class="form-label">部门</label>
              <select class="ui-select" data-component="select">
                <option value="" disabled selected>请选择</option>
                <option>技术部</option>
                <option>产品部</option>
                <option>设计部</option>
              </select>
            </div>
            <div class="form-field">
              <label class="form-label">入职日期</label>
              <input type="date" class="ui-input" data-component="input">
            </div>
          </div>
          <div class="form-field">
            <label class="form-label">权限设置</label>
            <div class="checkbox-group" data-slot="control">
              <label class="checkbox"><input type="checkbox" checked><span>查看数据</span></label>
              <label class="checkbox"><input type="checkbox" checked><span>编辑内容</span></label>
              <label class="checkbox"><input type="checkbox"><span>管理用户</span></label>
              <label class="checkbox"><input type="checkbox"><span>系统设置</span></label>
            </div>
          </div>
          <div class="form-actions" data-slot="actions">
            <button type="submit" class="btn btn-md btn-primary" data-component="button">创建用户</button>
            <button type="button" class="btn btn-md btn-secondary" data-component="button">取消</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="pv-section">
    <div class="pv-section__title">带校验态的表单</div>
    <div class="demo-box">
      <div class="form-card">
        <h3 class="form-title">账号设置</h3>
        <form class="form" data-component="form" onsubmit="return false">
          <div class="form-field">
            <label class="form-label">用户名 <span class="required">*</span></label>
            <input type="text" class="ui-input input-error" data-component="input" value="ab">
            <span class="form-error-text">用户名长度不能少于 3 个字符</span>
          </div>
          <div class="form-field">
            <label class="form-label">密码 <span class="required">*</span></label>
            <input type="password" class="ui-input input-error" data-component="input" value="123">
            <span class="form-error-text">密码必须包含大小写字母和数字，长度至少 8 位</span>
          </div>
          <div class="form-field">
            <label class="form-label">邮箱 <span class="required">*</span></label>
            <input type="email" class="ui-input input-success" data-component="input" value="user@example.com">
            <span class="form-success-text">邮箱格式正确</span>
          </div>
          <div class="form-field">
            <label class="form-label">启用双因素认证</label>
            <label class="switch">
              <input type="checkbox">
              <span class="switch-slider"></span>
            </label>
          </div>
          <div class="form-actions" data-slot="actions">
            <button type="submit" class="btn btn-md btn-primary" data-component="button">保存设置</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="pv-section">
    <div class="pv-section__title">分组表单</div>
    <div class="demo-box">
      <div class="form-card">
        <h3 class="form-title">项目配置</h3>
        <form class="form" data-component="form" onsubmit="return false">
          <div class="form-section">
            <h4 class="form-section-title">基本设置</h4>
            <div class="form-field">
              <label class="form-label">项目名称 <span class="required">*</span></label>
              <input type="text" class="ui-input" data-component="input" placeholder="请输入项目名称">
            </div>
            <div class="form-field">
              <label class="form-label">描述</label>
              <textarea class="ui-textarea" rows="2" placeholder="简要描述项目"></textarea>
            </div>
          </div>
          <hr class="divider">
          <div class="form-section">
            <h4 class="form-section-title">高级设置</h4>
            <div class="form-grid-row">
              <div class="form-field">
                <label class="form-label">环境</label>
                <select class="ui-select" data-component="select">
                  <option>生产环境</option>
                  <option>测试环境</option>
                  <option>开发环境</option>
                </select>
              </div>
              <div class="form-field">
                <label class="form-label">区域</label>
                <select class="ui-select" data-component="select">
                  <option>华北</option>
                  <option>华东</option>
                  <option>华南</option>
                </select>
              </div>
            </div>
            <div class="form-field">
              <label class="form-label">自动扩容</label>
              <label class="switch">
                <input type="checkbox" checked>
                <span class="switch-slider"></span>
              </label>
              <span class="form-help">开启后系统将根据负载自动调整资源</span>
            </div>
          </div>
          <div class="form-actions" data-slot="actions">
            <button type="submit" class="btn btn-md btn-primary" data-component="button">保存配置</button>
            <button type="button" class="btn btn-md btn-secondary" data-component="button">重置</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
