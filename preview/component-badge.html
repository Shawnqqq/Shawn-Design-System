<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Badge 徽标</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.8.5/dist/index.css">
  <style>
    :root {
      --color-primary: #1764E8;
      --color-success: #67C23A;
      --color-warning: #E6A23C;
      --color-danger: #F56C6C;
      --text-primary: rgba(0, 0, 0, 0.85);
      --text-secondary: rgba(0, 0, 0, 0.65);
      --text-muted: rgba(0, 0, 0, 0.45);
      --page-bg: #f5f7fa;
      --card-bg: #fff;
      --font-stack: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-stack);
      background: var(--page-bg);
      color: var(--text-primary);
      padding: 40px;
    }

    .page-header {
      margin-bottom: 32px;
    }

    .page-header h1 {
      font-size: 28px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .page-header p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .section {
      background: var(--card-bg);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .section-title {
      position: relative;
      margin: 0 0 12px 14px;
      font-size: 16px;
      font-weight: 500;
      color: rgba(0, 0, 0, 0.85);
    }

    .section-title::after {
      content: '';
      position: absolute;
      top: 50%;
      left: -12px;
      transform: translateY(-50%);
      width: 4px;
      height: 16px;
      background-color: #1764e8;
      border-top: 4px solid #C9D8F2;
      border-bottom: 4px solid #C9D8F2;
    }

    .demo-row {
      display: flex;
      align-items: center;
      gap: 32px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .demo-label {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .demo-group {
      margin-bottom: 24px;
    }

    .demo-group:last-child {
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="page-header">
      <h1>Badge 徽标</h1>
      <p>出现在按钮、图标旁边的数字或状态标记。</p>
    </div>

    <!-- 基础用法 -->
    <div class="section-title">基础用法</div>
    <div class="section">
      <div class="demo-row">
        <el-badge :value="12" class="item">
          <el-button>评论</el-button>
        </el-badge>
        <el-badge :value="3" class="item">
          <el-button>回复</el-button>
        </el-badge>
        <el-badge :value="1" class="item" type="primary">
          <el-button>评论</el-button>
        </el-badge>
        <el-badge :value="2" class="item" type="warning">
          <el-button>回复</el-button>
        </el-badge>
      </div>
    </div>

    <!-- 最大值 -->
    <div class="section-title">最大值</div>
    <div class="section">
      <div class="demo-row">
        <el-badge :value="200" :max="99" class="item">
          <el-button>评论</el-button>
        </el-badge>
        <el-badge :value="100" :max="10" class="item">
          <el-button>回复</el-button>
        </el-badge>
      </div>
    </div>

    <!-- 小圆点 -->
    <div class="section-title">小圆点</div>
    <div class="section">
      <div class="demo-row">
        <el-badge is-dot class="item">数据查询</el-badge>
        <el-badge is-dot class="item">
          <el-button class="share-button" :icon="Share" type="primary"></el-button>
        </el-badge>
      </div>
    </div>

    <!-- 自定义内容 -->
    <div class="section-title">自定义内容</div>
    <div class="section">
      <div class="demo-row">
        <el-badge value="new" class="item">
          <el-button>评论</el-button>
        </el-badge>
        <el-badge value="hot" class="item">
          <el-button>回复</el-button>
        </el-badge>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus@2.8.5/dist/index.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@element-plus/icons-vue@2.3.1/dist/index.iife.min.js"></script>
  <script>
    const { createApp } = Vue;

    const app = createApp({
      setup() {
        return {
          Share: ElementPlusIconsVue.Share
        };
      }
    });

    for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
      app.component(key, component);
    }

    const zhCn = {
      name: 'zh-cn',
      el: {
        pagination: { goto: '前往', pagesize: '条/页', total: '共 {total} 条', pageClassifier: '页', page: '页', prev: '上一页', next: '下一页', currentPage: '第 {pager} 页' },
        select: { loading: '加载中', noMatch: '无匹配数据', noData: '暂无数据', placeholder: '请选择' },
        table: { emptyText: '暂无数据', confirmFilter: '确认', resetFilter: '重置', clearFilter: '全部', sumText: '合计' },
        pageHeader: { title: '返回' },
        datepicker: { now: '此刻', today: '今天', cancel: '取消', clear: '清空', confirm: '确定', startDate: '开始日期', startTime: '开始时间', endDate: '结束日期', endTime: '结束时间', prevYear: '前一年', nextYear: '后一年', prevMonth: '上个月', nextMonth: '下个月', year: '年', month1: '1月', month2: '2月', month3: '3月', month4: '4月', month5: '5月', month6: '6月', month7: '7月', month8: '8月', month9: '9月', month10: '10月', month11: '11月', month12: '12月', weeks: { sun: '日', mon: '一', tue: '二', wed: '三', thu: '四', fri: '五', sat: '六' }, months: { jan: '一月', feb: '二月', mar: '三月', apr: '四月', may: '五月', jun: '六月', jul: '七月', aug: '八月', sep: '九月', oct: '十月', nov: '十一月', dec: '十二月' } }
      }
    };    app.use(ElementPlus, { locale: zhCn });
    app.mount('#app');
  </script>
</body>
</html>
