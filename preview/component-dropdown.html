<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dropdown 下拉菜单</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.8.5/dist/index.css">
  <style>
    :root {
      --color-primary: #1764E8;
      --color-success: #67C23A;
      --color-warning: #E6A23C;
      --color-danger: #F56C6C;
      --text-primary: rgba(0, 0, 0, 0.85);
      --text-secondary: rgba(0, 0, 0, 0.65);
      --text-muted: rgba(0, 0, 0, 0.45);
      --page-bg: #f5f7fa;
      --card-bg: #fff;
      --font-stack: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-stack);
      background: var(--page-bg);
      color: var(--text-primary);
      padding: 40px;
    }

    .page-header {
      margin-bottom: 32px;
    }

    .page-header h1 {
      font-size: 28px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .page-header p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .section {
      background: var(--card-bg);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .section-title {
      position: relative;
      margin: 0 0 12px 14px;
      font-size: 16px;
      font-weight: 500;
      color: rgba(0, 0, 0, 0.85);
    }

    .section-title::after {
      content: '';
      position: absolute;
      top: 50%;
      left: -12px;
      transform: translateY(-50%);
      width: 4px;
      height: 16px;
      background-color: #1764e8;
      border-top: 4px solid #C9D8F2;
      border-bottom: 4px solid #C9D8F2;
    }

    .demo-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .demo-group {
      margin-bottom: 24px;
    }

    .demo-group:last-child {
      margin-bottom: 0;
    }

    .demo-label {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="page-header">
      <h1>Dropdown 下拉菜单</h1>
      <p>将动作或菜单折叠到下拉菜单中。</p>
    </div>

    <!-- 基础下拉 -->
    <div class="section-title">基础下拉</div>
    <div class="section">
      <div class="demo-row">
        <el-dropdown @command="handleCommand">
          <el-button type="primary">
            下拉菜单
            <el-icon class="el-icon--right"><ArrowDown></ArrowDown></el-icon>
          </el-button>
          <template #dropdown>
            <el-dropdown-menu>
              <el-dropdown-item>北京</el-dropdown-item>
              <el-dropdown-item>上海</el-dropdown-item>
              <el-dropdown-item>杭州</el-dropdown-item>
              <el-dropdown-item>深圳</el-dropdown-item>
              <el-dropdown-item>广州</el-dropdown-item>
            </el-dropdown-menu>
          </template>
        </el-dropdown>
      </div>
    </div>

    <!-- 触发方式 -->
    <div class="section-title">触发方式</div>
    <div class="section">
      <div class="demo-group">
        <div class="demo-label">hover 触发</div>
        <div class="demo-row">
          <el-dropdown>
            <el-button>
              Hover 触发
              <el-icon class="el-icon--right"><ArrowDown></ArrowDown></el-icon>
            </el-button>
            <template #dropdown>
              <el-dropdown-menu>
                <el-dropdown-item>北京</el-dropdown-item>
                <el-dropdown-item>上海</el-dropdown-item>
                <el-dropdown-item>杭州</el-dropdown-item>
              </el-dropdown-menu>
            </template>
          </el-dropdown>
        </div>
      </div>
      <div class="demo-group">
        <div class="demo-label">click 触发</div>
        <div class="demo-row">
          <el-dropdown trigger="click">
            <el-button>
              Click 触发
              <el-icon class="el-icon--right"><ArrowDown></ArrowDown></el-icon>
            </el-button>
            <template #dropdown>
              <el-dropdown-menu>
                <el-dropdown-item>北京</el-dropdown-item>
                <el-dropdown-item>上海</el-dropdown-item>
                <el-dropdown-item>杭州</el-dropdown-item>
              </el-dropdown-menu>
            </template>
          </el-dropdown>
        </div>
      </div>
    </div>

    <!-- 带图标 -->
    <div class="section-title">带图标</div>
    <div class="section">
      <div class="demo-row">
        <el-dropdown @command="handleCommand">
          <el-button type="primary">
            更多操作
            <el-icon class="el-icon--right"><ArrowDown></ArrowDown></el-icon>
          </el-button>
          <template #dropdown>
            <el-dropdown-menu>
              <el-dropdown-item>
                <el-icon><Edit></Edit></el-icon>
                编辑
              </el-dropdown-item>
              <el-dropdown-item>
                <el-icon><CopyDocument></CopyDocument></el-icon>
                复制
              </el-dropdown-item>
              <el-dropdown-item divided>
                <el-icon><Delete></Delete></el-icon>
                删除
              </el-dropdown-item>
            </el-dropdown-menu>
          </template>
        </el-dropdown>
      </div>
    </div>

    <!-- 分组 -->
    <div class="section-title">分组</div>
    <div class="section">
      <div class="demo-row">
        <el-dropdown @command="handleCommand">
          <el-button>
            分组菜单
            <el-icon class="el-icon--right"><ArrowDown></ArrowDown></el-icon>
          </el-button>
          <template #dropdown>
            <el-dropdown-menu>
              <el-dropdown-item-group>
                <template #title>华北地区</template>
                <el-dropdown-item>北京</el-dropdown-item>
                <el-dropdown-item>上海</el-dropdown-item>
                <el-dropdown-item>杭州</el-dropdown-item>
              </el-dropdown-item-group>
              <el-dropdown-item-group>
                <template #title>华南地区</template>
                <el-dropdown-item>深圳</el-dropdown-item>
                <el-dropdown-item>广州</el-dropdown-item>
              </el-dropdown-item-group>
            </el-dropdown-menu>
          </template>
        </el-dropdown>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus@2.8.5/dist/index.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@element-plus/icons-vue@2.3.1/dist/index.iife.min.js"></script>
  <script>
    const { createApp } = Vue;

    const app = createApp({
      setup() {
        const handleCommand = (command) => {
          ElMessage.success('点击了：' + command);
        };

        return {
          handleCommand,
          Edit: ElementPlusIconsVue.Edit,
          CopyDocument: ElementPlusIconsVue.CopyDocument,
          Delete: ElementPlusIconsVue.Delete
        };
      }
    });

    for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
      app.component(key, component);
    }

    const zhCn = {
      name: 'zh-cn',
      el: {
        pagination: { goto: '前往', pagesize: '条/页', total: '共 {total} 条', pageClassifier: '页', page: '页', prev: '上一页', next: '下一页', currentPage: '第 {pager} 页' },
        select: { loading: '加载中', noMatch: '无匹配数据', noData: '暂无数据', placeholder: '请选择' },
        table: { emptyText: '暂无数据', confirmFilter: '确认', resetFilter: '重置', clearFilter: '全部', sumText: '合计' },
        pageHeader: { title: '返回' },
        datepicker: { now: '此刻', today: '今天', cancel: '取消', clear: '清空', confirm: '确定', startDate: '开始日期', startTime: '开始时间', endDate: '结束日期', endTime: '结束时间', prevYear: '前一年', nextYear: '后一年', prevMonth: '上个月', nextMonth: '下个月', year: '年', month1: '1月', month2: '2月', month3: '3月', month4: '4月', month5: '5月', month6: '6月', month7: '7月', month8: '8月', month9: '9月', month10: '10月', month11: '11月', month12: '12月', weeks: { sun: '日', mon: '一', tue: '二', wed: '三', thu: '四', fri: '五', sat: '六' }, months: { jan: '一月', feb: '二月', mar: '三月', apr: '四月', may: '五月', jun: '六月', jul: '七月', aug: '八月', sep: '九月', oct: '十月', nov: '十一月', dec: '十二月' } }
      }
    };    app.use(ElementPlus, { locale: zhCn });
    app.mount('#app');
  </script>
</body>
</html>
