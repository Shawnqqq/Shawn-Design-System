<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Switch 开关</title>
  <link rel="stylesheet" href="preview-scaffold.css">
  <link rel="stylesheet" href="../colors_and_type.css">
  <link rel="stylesheet" href="../components.css">
</head>
<body>
  <div class="pv-header">
    <h1>Switch 开关</h1>
    <p>切换开关组件，支持默认和小尺寸，包含开启、关闭、禁用和加载状态。</p>
  </div>

  <div class="pv-section">
    <div class="pv-section__title">Default 尺寸 (20px)</div>
    <div class="row">
      <button class="switch switch-md" data-component="switch" data-size="default" data-checked="false" data-state="default" role="switch" aria-checked="false"><span class="switch-knob"></span></button>
      <button class="switch switch-md checked" data-component="switch" data-size="default" data-checked="true" data-state="default" role="switch" aria-checked="true"><span class="switch-knob"></span></button>
      <button class="switch switch-md disabled" disabled data-component="switch" data-size="default" data-checked="false" data-state="disabled" role="switch" aria-checked="false"><span class="switch-knob"></span></button>
      <button class="switch switch-md checked disabled" disabled data-component="switch" data-size="default" data-checked="true" data-state="disabled" role="switch" aria-checked="true"><span class="switch-knob"></span></button>
      <button class="switch switch-md checked loading" data-component="switch" data-size="default" data-checked="true" data-state="loading" role="switch" aria-checked="true"><span class="switch-knob"></span></button>
    </div>
  </div>

  <div class="pv-section">
    <div class="pv-section__title">Small 尺寸 (16px)</div>
    <div class="row">
      <button class="switch switch-sm" data-component="switch" data-size="small" data-checked="false" data-state="default" role="switch" aria-checked="false"><span class="switch-knob"></span></button>
      <button class="switch switch-sm checked" data-component="switch" data-size="small" data-checked="true" data-state="default" role="switch" aria-checked="true"><span class="switch-knob"></span></button>
      <button class="switch switch-sm disabled" disabled data-component="switch" data-size="small" data-checked="false" data-state="disabled" role="switch" aria-checked="false"><span class="switch-knob"></span></button>
      <button class="switch switch-sm checked disabled" disabled data-component="switch" data-size="small" data-checked="true" data-state="disabled" role="switch" aria-checked="true"><span class="switch-knob"></span></button>
      <button class="switch switch-sm checked loading" data-component="switch" data-size="small" data-checked="true" data-state="loading" role="switch" aria-checked="true"><span class="switch-knob"></span></button>
    </div>
  </div>
</body>
</html>
