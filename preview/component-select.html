<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Select 选择器</title>
  <link rel="stylesheet" href="preview-scaffold.css">
  <link rel="stylesheet" href="../colors_and_type.css">
  <link rel="stylesheet" href="../components.css">
</head>
<body>
<!--
  ⚠️ CODE TEMPLATE — 本文件是代码模板，不是视觉参考。
  使用方法：找到需要的变体 → 原样复制 HTML（包括所有 class 名和 DOM 结构）→ 只修改文字和数据。
  禁止：用 Tailwind 重写、改变 class 命名、简化 DOM 结构、用自定义 class 替代。
-->
  <div class="pv-header">
    <h1>Select 选择器</h1>
    <p>单选与多选下拉选择器，支持搜索、分组、清除、多选标签等特性。</p>
  </div>

  <div class="pv-section">
    <div class="pv-section__title">单选 — 各尺寸</div>
    <div class="row">
      <div class="select select-large" data-component="select" data-type="single" data-size="large" data-state="default">
        <div class="select-trigger">
          <span class="select-value select-placeholder">请选择</span>
          <span class="select-suffix"><svg class="select-arrow" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        </div>
      </div>
      <div class="select" data-component="select" data-type="single" data-size="default" data-state="default">
        <div class="select-trigger">
          <span class="select-value select-placeholder">请选择</span>
          <span class="select-suffix"><svg class="select-arrow" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        </div>
      </div>
      <div class="select select-small" data-component="select" data-type="single" data-size="small" data-state="default">
        <div class="select-trigger">
          <span class="select-value select-placeholder">请选择</span>
          <span class="select-suffix"><svg class="select-arrow" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        </div>
      </div>
      <div class="select select-mini" data-component="select" data-type="single" data-size="mini" data-state="default">
        <div class="select-trigger">
          <span class="select-value select-placeholder">请选择</span>
          <span class="select-suffix"><svg class="select-arrow" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        </div>
      </div>
    </div>
  </div>

  <div class="pv-section">
    <div class="pv-section__title">单选 — 交互状态</div>
    <div class="row">
      <div class="select hover" data-component="select" data-type="single" data-size="default" data-state="hover">
        <div class="select-trigger">
          <span class="select-value select-placeholder">请选择</span>
          <span class="select-suffix"><svg class="select-arrow" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        </div>
      </div>
      <div class="select" data-component="select" data-type="single" data-size="default" data-state="filled">
        <div class="select-trigger">
          <span class="select-value">选项一</span>
          <span class="select-suffix">
            <svg class="select-clear" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" fill="currentColor" opacity="0.15"/><path d="M5.5 5.5l5 5M10.5 5.5l-5 5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
            <svg class="select-arrow" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
        </div>
      </div>
      <div class="select disabled" data-component="select" data-type="single" data-size="default" data-state="disabled">
        <div class="select-trigger">
          <span class="select-value select-placeholder">请选择</span>
          <span class="select-suffix"><svg class="select-arrow" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        </div>
      </div>
      <div class="select disabled" data-component="select" data-type="single" data-size="default" data-state="disabled-filled">
        <div class="select-trigger">
          <span class="select-value">选项一</span>
          <span class="select-suffix"><svg class="select-arrow" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        </div>
      </div>
      <div class="select readonly" data-component="select" data-type="single" data-size="default" data-state="readonly">
        <div class="select-trigger">
          <span class="select-value">选项一</span>
          <span class="select-suffix"><svg class="select-arrow" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        </div>
      </div>
    </div>
  </div>

  <div class="pv-section">
    <div class="pv-section__title">单选 — 展开下拉</div>
    <div class="row">
      <div class="select focus" data-component="select" data-type="single" data-size="default" data-state="focus">
        <div class="select-trigger">
          <span class="select-value">选项一</span>
          <span class="select-suffix"><svg class="select-arrow rotated" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        </div>
        <div class="select-dropdown">
          <div class="select-option selected">选项一<svg class="select-option-check" viewBox="0 0 16 16" fill="none"><path d="M3 8l4 4 6-8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <div class="select-option">选项二</div>
          <div class="select-option">选项三</div>
          <div class="select-option disabled">选项四（禁用）</div>
        </div>
      </div>
    </div>
  </div>

  <div class="pv-section">
    <div class="pv-section__title">单选 — Error 状态</div>
    <div class="row">
      <div class="select error" data-component="select" data-type="single" data-size="default" data-state="error">
        <div class="select-trigger">
          <span class="select-value select-placeholder">请选择</span>
          <span class="select-suffix"><svg class="select-arrow" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        </div>
        <div class="select-error-msg">请选择一个选项</div>
      </div>
      <div class="select error hover" data-component="select" data-type="single" data-size="default" data-state="error-hover">
        <div class="select-trigger">
          <span class="select-value select-placeholder">请选择</span>
          <span class="select-suffix"><svg class="select-arrow" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        </div>
      </div>
      <div class="select error focus" data-component="select" data-type="single" data-size="default" data-state="error-focus">
        <div class="select-trigger">
          <span class="select-value select-placeholder">请选择</span>
          <span class="select-suffix"><svg class="select-arrow rotated" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        </div>
        <div class="select-dropdown">
          <div class="select-option">选项一</div>
          <div class="select-option">选项二</div>
        </div>
      </div>
    </div>
  </div>

  <div class="pv-section">
    <div class="pv-section__title">单选 — 下拉面板特殊状态</div>
    <div class="row">
      <div class="select focus" data-component="select" data-type="single" data-size="default" data-state="focus-grouped">
        <div class="select-trigger">
          <span class="select-value select-placeholder">请选择</span>
          <span class="select-suffix"><svg class="select-arrow rotated" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        </div>
        <div class="select-dropdown">
          <div class="select-group-title">分组一</div>
          <div class="select-option">选项一</div>
          <div class="select-option">选项二</div>
          <div class="select-group-title">分组二</div>
          <div class="select-option">选项三</div>
          <div class="select-option">选项四</div>
        </div>
      </div>
      <div class="select focus" data-component="select" data-type="single" data-size="default" data-state="focus-empty">
        <div class="select-trigger">
          <span class="select-value select-placeholder">请选择</span>
          <span class="select-suffix"><svg class="select-arrow rotated" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        </div>
        <div class="select-dropdown">
          <div class="select-empty">暂无数据</div>
        </div>
      </div>
    </div>
  </div>

  <div class="pv-section">
    <div class="pv-section__title">多选 — 各状态</div>
    <div class="stack-12">
      <div class="row">
        <div class="select" data-component="select" data-type="multiple" data-size="default" data-state="default">
          <div class="select-trigger">
            <span class="select-tags">
              <span class="select-tag"><span class="select-tag-text">选项一</span><svg class="select-tag-close" viewBox="0 0 12 12" fill="none"><path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg></span>
              <span class="select-tag"><span class="select-tag-text">选项二</span><svg class="select-tag-close" viewBox="0 0 12 12" fill="none"><path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg></span>
            </span>
            <span class="select-suffix"><svg class="select-arrow" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          </div>
        </div>
        <div class="select" data-component="select" data-type="multiple" data-size="default" data-state="overflow">
          <div class="select-trigger">
            <span class="select-tags">
              <span class="select-tag"><span class="select-tag-text">选项一</span><svg class="select-tag-close" viewBox="0 0 12 12" fill="none"><path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg></span>
              <span class="select-tag-count">+3</span>
            </span>
            <span class="select-suffix"><svg class="select-arrow" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          </div>
        </div>
        <div class="select select-large" data-component="select" data-type="multiple" data-size="large" data-state="default">
          <div class="select-trigger">
            <span class="select-tags">
              <span class="select-tag"><span class="select-tag-text">选项一</span><svg class="select-tag-close" viewBox="0 0 12 12" fill="none"><path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg></span>
              <span class="select-tag"><span class="select-tag-text">选项二</span><svg class="select-tag-close" viewBox="0 0 12 12" fill="none"><path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg></span>
            </span>
            <span class="select-suffix"><svg class="select-arrow" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="select focus" data-component="select" data-type="multiple" data-size="default" data-state="focus">
          <div class="select-trigger">
            <span class="select-tags">
              <span class="select-tag"><span class="select-tag-text">选项一</span><svg class="select-tag-close" viewBox="0 0 12 12" fill="none"><path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg></span>
            </span>
            <span class="select-suffix"><svg class="select-arrow rotated" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          </div>
          <div class="select-dropdown">
            <div class="select-option selected"><span class="select-checkbox checked"><svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-6" stroke="var(--color-white)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>选项一</div>
            <div class="select-option"><span class="select-checkbox"></span>选项二</div>
            <div class="select-option"><span class="select-checkbox"></span>选项三</div>
          </div>
        </div>
        <div class="select disabled" data-component="select" data-type="multiple" data-size="default" data-state="disabled">
          <div class="select-trigger">
            <span class="select-tags">
              <span class="select-tag"><span class="select-tag-text">选项一</span><svg class="select-tag-close" viewBox="0 0 12 12" fill="none"><path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg></span>
            </span>
            <span class="select-suffix"><svg class="select-arrow" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          </div>
        </div>
        <div class="select error" data-component="select" data-type="multiple" data-size="default" data-state="error">
          <div class="select-trigger">
            <span class="select-tags">
              <span class="select-tag"><span class="select-tag-text">选项一</span><svg class="select-tag-close" viewBox="0 0 12 12" fill="none"><path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg></span>
            </span>
            <span class="select-suffix"><svg class="select-arrow" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          </div>
          <div class="select-error-msg">请至少选择一个选项</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
