<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TimePicker 时间选择</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.8.5/dist/index.css">
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus@2.8.5/dist/index.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@element-plus/icons-vue@2.3.1/dist/index.iife.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus@2.8.5/dist/locale/zh-cn.min.js"></script>
  <style>
    :root {
      --color-primary: #1764E8;
      --color-success: #67C23A;
      --color-warning: #E6A23C;
      --color-danger: #F56C6C;
      --text-primary: rgba(0, 0, 0, 0.85);
      --text-secondary: rgba(0, 0, 0, 0.65);
      --text-muted: rgba(0, 0, 0, 0.45);
      --page-bg: #f5f7fa;
      --card-bg: #fff;
      --font-stack: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-stack);
      background-color: var(--page-bg);
      color: var(--text-primary);
      padding: 24px 32px;
    }

    .page-header {
      margin-bottom: 32px;
    }

    .page-header h1 {
      font-size: 28px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .page-header p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .card {
      background: var(--card-bg);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
    }

    .section-title {
      position: relative;
      margin: 0 0 16px 14px;
      font-size: 16px;
      font-weight: 500;
      color: rgba(0, 0, 0, 0.85);
    }

    .section-title::after {
      content: '';
      position: absolute;
      top: 50%;
      left: -12px;
      transform: translateY(-50%);
      width: 4px;
      height: 16px;
      background-color: #1764e8;
      border-top: 4px solid #C9D8F2;
      border-bottom: 4px solid #C9D8F2;
    }

    .demo-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
    }

    .demo-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .picker-item {
      margin-bottom: 16px;
    }

    .picker-item:last-child {
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="page-header">
      <h1>TimePicker 时间选择</h1>
      <p>时间选择输入组件，支持固定时间点、任意时间和时间范围选择。</p>
    </div>

    <!-- 固定时间点 -->
    <div class="section-title">固定时间点（Time Select）</div>
    <div class="card">
      <div class="picker-item">
        <div class="demo-label">默认选择</div>
        <el-time-select v-model="timeSelect" start="08:30" step="00:15" end="18:30" placeholder="选择时间" style="width: 240px;"></el-time-select>
      </div>
      <div class="picker-item">
        <div class="demo-label">带默认值</div>
        <el-time-select v-model="timeSelectDefault" start="08:30" step="00:15" end="18:30" placeholder="选择时间" style="width: 240px;"></el-time-select>
      </div>
      <div class="picker-item">
        <div class="demo-label">禁用状态</div>
        <el-time-select v-model="timeSelectDisabled" start="08:30" step="00:15" end="18:30" placeholder="选择时间" disabled style="width: 240px;"></el-time-select>
      </div>
    </div>

    <!-- 任意时间 -->
    <div class="section-title">任意时间（Time Picker）</div>
    <div class="card">
      <div class="picker-item">
        <div class="demo-label">默认选择</div>
        <el-time-picker v-model="timePicker" placeholder="选择时间" style="width: 240px;"></el-time-picker>
      </div>
      <div class="picker-item">
        <div class="demo-label">带默认值</div>
        <el-time-picker v-model="timePickerDefault" placeholder="选择时间" style="width: 240px;"></el-time-picker>
      </div>
      <div class="picker-item">
        <div class="demo-label">禁用状态</div>
        <el-time-picker v-model="timePickerDisabled" placeholder="选择时间" disabled style="width: 240px;"></el-time-picker>
      </div>
    </div>

    <!-- 时间范围 -->
    <div class="section-title">时间范围（Time Picker is-range）</div>
    <div class="card">
      <div class="picker-item">
        <div class="demo-label">默认范围选择</div>
        <el-time-picker v-model="timeRange" is-range range-separator="至" start-placeholder="开始时间" end-placeholder="结束时间" style="width: 400px;"></el-time-picker>
      </div>
      <div class="picker-item">
        <div class="demo-label">带默认值</div>
        <el-time-picker v-model="timeRangeDefault" is-range range-separator="至" start-placeholder="开始时间" end-placeholder="结束时间" style="width: 400px;"></el-time-picker>
      </div>
      <div class="picker-item">
        <div class="demo-label">禁用状态</div>
        <el-time-picker v-model="timeRangeDisabled" is-range range-separator="至" start-placeholder="开始时间" end-placeholder="结束时间" disabled style="width: 400px;"></el-time-picker>
      </div>
    </div>
  </div>

  <script>
    const { ref } = Vue;

    const app = Vue.createApp({
      setup() {
        const timeSelect = ref('');
        const timeSelectDefault = ref('09:30');
        const timeSelectDisabled = ref('10:00');

        const timePicker = ref('');
        const timePickerDefault = ref(new Date(2024, 0, 1, 9, 30, 0));
        const timePickerDisabled = ref(new Date(2024, 0, 1, 9, 30, 0));

        const timeRange = ref('');
        const timeRangeDefault = ref([
          new Date(2024, 0, 1, 9, 0, 0),
          new Date(2024, 0, 1, 18, 0, 0)
        ]);
        const timeRangeDisabled = ref([
          new Date(2024, 0, 1, 9, 0, 0),
          new Date(2024, 0, 1, 18, 0, 0)
        ]);

        return {
          timeSelect,
          timeSelectDefault,
          timeSelectDisabled,
          timePicker,
          timePickerDefault,
          timePickerDisabled,
          timeRange,
          timeRangeDefault,
          timeRangeDisabled
        };
      }
    });

    for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
      app.component(key, component);
    }

    const zhCn = {
      name: 'zh-cn',
      el: {
        pagination: { goto: '前往', pagesize: '条/页', total: '共 {total} 条', pageClassifier: '页', page: '页', prev: '上一页', next: '下一页', currentPage: '第 {pager} 页' },
        select: { loading: '加载中', noMatch: '无匹配数据', noData: '暂无数据', placeholder: '请选择' },
        table: { emptyText: '暂无数据', confirmFilter: '确认', resetFilter: '重置', clearFilter: '全部', sumText: '合计' },
        pageHeader: { title: '返回' },
        datepicker: { now: '此刻', today: '今天', cancel: '取消', clear: '清空', confirm: '确定', startDate: '开始日期', startTime: '开始时间', endDate: '结束日期', endTime: '结束时间', prevYear: '前一年', nextYear: '后一年', prevMonth: '上个月', nextMonth: '下个月', year: '年', month1: '1月', month2: '2月', month3: '3月', month4: '4月', month5: '5月', month6: '6月', month7: '7月', month8: '8月', month9: '9月', month10: '10月', month11: '11月', month12: '12月', weeks: { sun: '日', mon: '一', tue: '二', wed: '三', thu: '四', fri: '五', sat: '六' }, months: { jan: '一月', feb: '二月', mar: '三月', apr: '四月', may: '五月', jun: '六月', jul: '七月', aug: '八月', sep: '九月', oct: '十月', nov: '十一月', dec: '十二月' } }
      }
    };    app.use(ElementPlus, {
      locale: zhCn
    });

    app.mount('#app');
  </script>
</body>
</html>
