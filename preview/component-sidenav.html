<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Sidenav 侧导航</title>
  <link rel="stylesheet" href="preview-scaffold.css">
  <link rel="stylesheet" href="../colors_and_type.css">
  <link rel="stylesheet" href="../components.css">
  <style>
    .collapse-btn { display: inline-flex;
    flex-shrink: 0;
    align-items: flex-start;
    align-self: stretch;
    column-gap: 10px;
    border-top: 1px solid var(--border-2);
    padding: 11px 24px 12px;
    cursor: pointer;
    transition: background 0.15s; }
    .collapse-btn:hover { background: rgba(0, 0, 0, 0.04); }
    .collapse-btn svg { width: 16px; height: 16px; color: var(--text-1); }
    .sidenav.collapsed { display: inline-flex;
    width: auto;
    min-width: auto; }
    .sidenav.collapsed .sidenav-header { justify-content: center; padding: 20px 22px; }
    .sidenav.collapsed .collapsed-menu { display: flex;
    flex-direction: column;
    align-items: center;
    align-self: stretch;
    flex-grow: 1; }
    .sidenav.collapsed .collapsed-item { display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px 24px;
    cursor: pointer;
    transition: background 0.15s; }
    .sidenav.collapsed .collapsed-item:hover { background: rgba(0, 0, 0, 0.04); }
    .sidenav.collapsed .collapsed-item .menu-icon { width: 20px; height: 20px; }
    .collapsed-divider { width: 36px;
    height: 1px;
    background: var(--border-2);
    margin: 14px 12px;
    flex-shrink: 0; }
  </style>
</head>
