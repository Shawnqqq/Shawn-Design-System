<!--
  Shawn Design System — 弹框表单模板
  使用方法：复制此文件，替换字段、数据和接口调用。
  在 <style> 顶部注入用到的 CSS 变量（参考 tokens.css）。
  禁止：Tailwind CSS、Lucide 图标、CDN CSS 框架。
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>弹框表单模板</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus/dist/index.css" />
  <style>
    /* ========== Design Tokens ========== */
    :root {
      --color-primary: #1764E8;
      --color-success: #67C23A;
      --color-warning: #E6A23C;
      --color-danger:  #F56C6C;
      --text-primary:   rgba(0,0,0,0.85);
      --text-secondary: rgba(0,0,0,0.65);
      --text-muted:     rgba(0,0,0,0.45);
      --font-stack: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      --page-bg: #f5f7fa;
      --card-bg: #fff;
      --card-radius: 8px;
      --table-header-bg: #fafafa;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
    }

    /* ========== Reset & Base ========== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      font-family: var(--font-stack);
      font-size: 14px;
      color: var(--text-primary);
      background: #f5f7fa;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ========== Page Container ========== */
    .page-container {
      padding: 20px;
      min-height: 100vh;
    }

    /* ========== Filter Bar ========== */
    .filter-bar {
      background: var(--card-bg);
      padding: 12px 16px;
      border-radius: var(--card-radius);
      margin-bottom: 16px;
      box-shadow: var(--shadow-sm);
    }

    .filter-bar .el-form--inline {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .filter-bar .el-form-item {
      margin-bottom: 0;
      margin-right: 0;
    }

    .filter-bar .el-input,
    .filter-bar .el-select,
    .filter-bar .el-date-editor {
      width: 180px;
    }

    /* ========== Table Card ========== */
    .table-card {
      background: var(--card-bg);
      border-radius: var(--card-radius);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .table-card .el-table {
      --el-table-border-color: rgba(0,0,0,0.06);
      --el-table-header-bg-color: var(--table-header-bg);
      --el-table-row-height: 48px;
      --el-table-header-text-color: var(--text-primary);
      --el-table-text-color: var(--text-secondary);
      font-size: 14px;
    }

    .table-card .el-table th.el-table__cell {
      font-weight: 600;
      color: var(--text-primary);
      background: var(--table-header-bg);
    }

    .table-card .el-table .el-table__row td {
      height: 48px;
    }

    /* ========== Toolbar ========== */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ========== Action Buttons ========== */
    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 0;
      height: auto;
      font-size: 13px;
    }

    .action-btn svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .action-btn--edit {
      color: var(--color-primary);
    }

    .action-btn--edit:hover {
      color: #3d85f0;
    }

    .action-btn--delete {
      color: var(--color-danger);
    }

    .action-btn--delete:hover {
      color: #f78989;
    }

    /* ========== Pagination Bar ========== */
    .pagination-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-top: 1px solid rgba(0,0,0,0.06);
    }

    .pagination-total {
      font-size: 13px;
      color: var(--text-muted);
    }

    .pagination-bar .el-pagination {
      --el-pagination-font-size: 13px;
    }

    .pagination-bar .el-pagination .el-input {
      width: 80px;
    }

    /* ========== Dialog Overrides ========== */
    .el-dialog {
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }

    .el-dialog__header {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      margin-right: 0;
    }

    .el-dialog__title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .el-dialog__body {
      padding: 16px 20px;
    }

    .el-dialog__footer {
      padding: 12px 20px;
      border-top: 1px solid rgba(0,0,0,0.08);
    }

    /* ========== Dialog Form ========== */
    .dialog-form {
      max-width: 100%;
    }

    .dialog-form .el-form-item__label {
      color: var(--text-secondary);
    }

    .dialog-form .el-input,
    .dialog-form .el-select,
    .dialog-form .el-textarea,
    .dialog-form .el-date-editor {
      width: 100%;
    }

    .dialog-form .el-textarea__inner {
      min-height: 80px;
    }

    .dialog-form .el-form-item {
      margin-bottom: 12px;
    }

    .el-dialog__footer .el-button + .el-button {
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="page-container">
      <!-- 筛选区 -->
      <div class="filter-bar">
        <el-form :inline="true" :model="filterForm" @submit.prevent="handleSearch">
          <el-form-item>
            <el-input
              v-model="filterForm.keyword"
              placeholder="搜索名称"
              clearable
              @keyup.enter="handleSearch"
            >
              <template #prefix>
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="11" cy="11" r="8"/>
                  <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
              </template>
            </el-input>
          </el-form-item>
          <el-form-item>
            <el-select v-model="filterForm.status" placeholder="状态" clearable>
              <el-option label="启用" value="active" />
              <el-option label="禁用" value="disabled" />
              <el-option label="草稿" value="draft" />
            </el-select>
          </el-form-item>
          <el-form-item>
            <el-button type="primary" @click="handleSearch">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
              查询
            </el-button>
          </el-form-item>
          <el-form-item>
            <el-button @click="handleReset">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="1 4 1 10 7 10"/>
                <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
              </svg>
              重置
            </el-button>
          </el-form-item>
        </el-form>
      </div>

      <!-- 表格区 -->
      <div class="table-card">
        <!-- 工具栏 -->
        <div class="toolbar">
          <div class="toolbar-left">
            <el-button type="primary" @click="handleAdd">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              新增
            </el-button>
          </div>
        </div>

        <el-table
          :data="tableData"
          border
          stripe
          style="width: 100%"
        >
          <el-table-column prop="code" label="编码" width="140" show-overflow-tooltip />
          <el-table-column prop="name" label="名称" min-width="180" show-overflow-tooltip />
          <el-table-column prop="type" label="类型" width="110" align="center">
            <template #default="{ row }">
              <el-tag size="small" effect="plain">{{ row.type }}</el-tag>
            </template>
          </el-table-column>
          <el-table-column prop="version" label="版本" width="90" align="center" />
          <el-table-column prop="status" label="状态" width="90" align="center">
            <template #default="{ row }">
              <el-tag
                :type="statusTagType(row.status)"
                size="small"
                effect="light"
              >
                {{ statusLabel(row.status) }}
              </el-tag>
            </template>
          </el-table-column>
          <el-table-column prop="owner" label="负责人" width="100" />
          <el-table-column prop="description" label="描述" min-width="220" show-overflow-tooltip />
          <el-table-column prop="updatedAt" label="更新时间" width="170" />
          <el-table-column label="操作" width="150" fixed="right" align="center">
            <template #default="{ row }">
              <el-button
                class="action-btn action-btn--edit"
                type="primary"
                link
                @click="handleEdit(row)"
              >
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
                </svg>
                编辑
              </el-button>
              <el-button
                class="action-btn action-btn--delete"
                type="danger"
                link
                @click="handleDelete(row)"
              >
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="3 6 5 6 21 6"/>
                  <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                  <path d="M10 11v6"/>
                  <path d="M14 11v6"/>
                  <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                </svg>
                删除
              </el-button>
            </template>
          </el-table-column>
        </el-table>

        <!-- 分页栏 -->
        <div class="pagination-bar">
          <span class="pagination-total">共 {{ total }} 条</span>
          <el-pagination
            v-model:current-page="pagination.page"
            v-model:page-size="pagination.pageSize"
            :page-sizes="[20, 50, 100, 200, 500]"
            :total="total"
            layout="sizes, prev, pager, next, jumper"
            @size-change="handlePageChange"
            @current-change="handlePageChange"
          />
        </div>
      </div>

      <!-- 弹框表单 -->
      <el-dialog
        v-model="dialogVisible"
        :title="dialogTitle"
        width="720px"
        :destroy-on-close="true"
        @closed="handleDialogClosed"
      >
        <el-form
          ref="formRef"
          :model="formData"
          :rules="formRules"
          label-width="100px"
          class="dialog-form"
        >
          <el-form-item label="名称" prop="name">
            <el-input
              v-model="formData.name"
              placeholder="请输入名称"
              maxlength="50"
              show-word-limit
              clearable
            />
          </el-form-item>
          <el-form-item label="类型" prop="type">
            <el-select v-model="formData.type" placeholder="请选择类型" clearable>
              <el-option label="基础模块" value="基础模块" />
              <el-option label="业务组件" value="业务组件" />
              <el-option label="工具服务" value="工具服务" />
              <el-option label="数据引擎" value="数据引擎" />
            </el-select>
          </el-form-item>
          <el-form-item label="描述" prop="description">
            <el-input
              v-model="formData.description"
              type="textarea"
              placeholder="请输入描述"
              :autosize="{ minRows: 3, maxRows: 6 }"
              maxlength="500"
              show-word-limit
            />
          </el-form-item>
          <el-form-item label="日期" prop="date">
            <el-date-picker
              v-model="formData.date"
              type="date"
              placeholder="请选择日期"
              value-format="YYYY-MM-DD"
              style="width: 100%"
            />
          </el-form-item>
          <el-form-item label="状态" prop="status">
            <el-switch
              v-model="formData.status"
              active-text="启用"
              inactive-text="禁用"
              active-value="active"
              inactive-value="disabled"
            />
          </el-form-item>
        </el-form>

        <template #footer>
          <el-button @click="dialogVisible = false">取消</el-button>
          <el-button type="primary" :loading="submitLoading" @click="handleSubmit">确定</el-button>
        </template>
      </el-dialog>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus/dist/index.full.min.js"></script>
  <script>
    const { createApp, ref, reactive, computed, nextTick } = Vue;

    const app = createApp({
      setup() {
        /* ---- 筛选表单 ---- */
        const filterForm = reactive({
          keyword: '',
          status: '',
        });

        /* ---- 分页 ---- */
        const pagination = reactive({
          page: 1,
          pageSize: 50,
        });
        const total = ref(128);

        /* ---- 示例数据 ---- */
        const tableData = ref([
          { id: 1, code: 'MOD-2026-001', name: '供应链管理模块',     type: '基础模块', version: 'v2.3.1', status: 'active',   owner: '张伟',   description: '覆盖采购、仓储、物流全链路的供应链核心模块，支持多级供应商协同管理', updatedAt: '2026-07-10 09:30:00' },
          { id: 2, code: 'CMP-2026-012', name: '客户关系管理系统',   type: '业务组件', version: 'v1.8.0', status: 'active',   owner: '李娜',   description: '集成客户画像、跟进记录、商机漏斗等功能的 CRM 组件', updatedAt: '2026-07-09 14:20:00' },
          { id: 3, code: 'ENG-2026-005', name: '财务报表引擎',       type: '数据引擎', version: 'v3.1.2', status: 'disabled', owner: '王强',   description: '支持多维度财务数据聚合、自动出具三大报表及自定义报表模板', updatedAt: '2026-07-08 11:05:00' },
          { id: 4, code: 'SRV-2026-008', name: '统一权限网关服务',   type: '工具服务', version: 'v1.2.0', status: 'draft',    owner: '赵敏',   description: '基于 RBAC 模型的统一鉴权网关，支持 OAuth2.0 与 SSO 单点登录', updatedAt: '2026-07-07 16:45:00' },
          { id: 5, code: 'SRV-2026-011', name: '数据同步中间件',     type: '工具服务', version: 'v2.0.3', status: 'active',   owner: '孙鹏',   description: '支持 MySQL、PostgreSQL、MongoDB 等异构数据源的实时增量同步', updatedAt: '2026-07-06 08:10:00' },
          { id: 6, code: 'CMP-2026-015', name: '审批流程引擎',       type: '业务组件', version: 'v1.5.4', status: 'active',   owner: '周洋',   description: '可视化流程编排引擎，支持串行、并行、条件分支及加签转签', updatedAt: '2026-07-05 17:20:00' },
          { id: 7, code: 'MOD-2026-003', name: '人力资源管理平台',   type: '基础模块', version: 'v4.0.1', status: 'active',   owner: '吴芳',   description: '涵盖组织架构、考勤排假、薪酬核算、绩效考核等 HR 核心域', updatedAt: '2026-07-04 10:15:00' },
          { id: 8, code: 'ENG-2026-009', name: '实时消息推送引擎',   type: '数据引擎', version: 'v1.1.0', status: 'draft',    owner: '郑涛',   description: '基于 WebSocket 的实时消息推送，支持按租户、角色、用户多维定向', updatedAt: '2026-07-03 13:40:00' },
          { id: 9, code: 'SRV-2026-014', name: '文件存储服务',       type: '工具服务', version: 'v2.2.0', status: 'active',   owner: '陈琳',   description: '兼容 S3 协议的对象存储服务，支持分片上传、断点续传及 CDN 加速', updatedAt: '2026-07-02 09:55:00' },
          { id: 10, code: 'CMP-2026-018', name: '数据可视化大屏组件', type: '业务组件', version: 'v1.0.2', status: 'disabled', owner: '黄磊',   description: '拖拽式大屏搭建组件，内置折线图、柱状图、地图等 20+ 图表类型', updatedAt: '2026-07-01 15:30:00' },
        ]);

        /* ---- 弹框状态 ---- */
        const dialogVisible = ref(false);
        const dialogMode = ref('add'); // 'add' | 'edit'
        const submitLoading = ref(false);
        const formRef = ref(null);

        const dialogTitle = computed(() => {
          return dialogMode.value === 'add' ? '新增' : '编辑';
        });

        /* ---- 表单数据 ---- */
        const defaultFormData = () => ({
          name: '',
          type: '',
          description: '',
          date: '',
          status: 'active',
        });

        const formData = reactive(defaultFormData());

        /* ---- 表单校验 ---- */
        const formRules = {
          name: [
            { required: true, message: '请输入名称', trigger: 'blur' },
            { min: 2, max: 50, message: '长度在 2 到 50 个字符', trigger: 'blur' },
          ],
          type: [
            { required: true, message: '请选择类型', trigger: 'change' },
          ],
          description: [
            { required: true, message: '请输入描述', trigger: 'blur' },
          ],
          date: [
            { required: true, message: '请选择日期', trigger: 'change' },
          ],
        };

        /* ---- 状态映射 ---- */
        function statusTagType(status) {
          const map = { active: 'success', disabled: 'danger', draft: 'warning' };
          return map[status] || 'info';
        }

        function statusLabel(status) {
          const map = { active: '启用', disabled: '禁用', draft: '草稿' };
          return map[status] || status;
        }

        /* ---- 新增 ---- */
        function handleAdd() {
          dialogMode.value = 'add';
          Object.assign(formData, defaultFormData());
          dialogVisible.value = true;
        }

        /* ---- 编辑 ---- */
        function handleEdit(row) {
          dialogMode.value = 'edit';
          Object.assign(formData, {
            id: row.id,
            name: row.name,
            type: row.type,
            description: row.description || '',
            date: row.date || '',
            status: row.status,
          });
          dialogVisible.value = true;
        }

        /* ---- 提交 ---- */
        async function handleSubmit() {
          if (!formRef.value) return;
          try {
            await formRef.value.validate();
          } catch {
            return;
          }

          submitLoading.value = true;
          try {
            // 替换为实际接口调用
            await new Promise(resolve => setTimeout(resolve, 600));
            const action = dialogMode.value === 'add' ? '新增' : '编辑';
            ElementPlus.ElMessage.success(action + '成功');
            dialogVisible.value = false;
            // 刷新列表
          } catch (err) {
            ElementPlus.ElMessage.error('操作失败');
          } finally {
            submitLoading.value = false;
          }
        }

        /* ---- 弹框关闭后重置 ---- */
        function handleDialogClosed() {
          if (formRef.value) {
            formRef.value.resetFields();
          }
        }

        /* ---- 删除 ---- */
        function handleDelete(row) {
          ElementPlus.ElMessageBox.confirm(
            '确定删除「' + row.name + '」？删除后无法恢复。',
            '确认删除',
            { confirmButtonText: '删除', cancelButtonText: '取消', type: 'warning' }
          ).then(() => {
            ElementPlus.ElMessage.success('已删除：' + row.name);
          }).catch(() => {});
        }

        /* ---- 筛选与分页 ---- */
        function handleSearch() {
          ElementPlus.ElMessage.success('查询条件：' + JSON.stringify({ keyword: filterForm.keyword, status: filterForm.status }));
        }

        function handleReset() {
          filterForm.keyword = '';
          filterForm.status = '';
          pagination.page = 1;
          ElementPlus.ElMessage.info('已重置筛选条件');
        }

        function handlePageChange() {
          // 替换为实际接口调用
        }

        return {
          filterForm,
          pagination,
          total,
          tableData,
          dialogVisible,
          dialogMode,
          dialogTitle,
          submitLoading,
          formRef,
          formData,
          formRules,
          statusTagType,
          statusLabel,
          handleAdd,
          handleEdit,
          handleSubmit,
          handleDialogClosed,
          handleDelete,
          handleSearch,
          handleReset,
          handlePageChange,
        };
      },
    });

    app.use(ElementPlus);
    app.mount('#app');
  </script>
</body>
</html>
