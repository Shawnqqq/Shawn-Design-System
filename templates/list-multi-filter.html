<!--
  Shawn Design System — 列表页（多筛选多按钮）
  使用方法：复制此文件，替换文字和数据内容。
  在 <style> 顶部注入用到的 CSS 变量（参考 tokens.css）。
  禁止：Tailwind CSS、Lucide 图标、CDN CSS 框架。
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>多筛选多按钮列表页</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus/dist/index.css" />
  <style>
    /* ========== Design Tokens ========== */
    :root {
      --color-primary: #1764E8;
      --color-success: #67C23A;
      --color-warning: #E6A23C;
      --color-danger:  #F56C6C;
      --text-primary:   rgba(0,0,0,0.85);
      --text-secondary: rgba(0,0,0,0.65);
      --text-muted:     rgba(0,0,0,0.45);
      --font-stack: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      --page-bg: #f5f7fa;
      --card-bg: #fff;
      --card-radius: 8px;
      --table-header-bg: #fafafa;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
    }

    /* ========== Reset & Base ========== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      font-family: var(--font-stack);
      font-size: 14px;
      color: var(--text-primary);
      background: var(--page-bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ========== Page Container ========== */
    .page-container {
      padding: 20px;
      min-height: 100vh;
      background: var(--page-bg);
    }

    /* ========== Filter Bar ========== */
    .filter-bar {
      background: var(--card-bg);
      padding: 16px 16px 8px;
      border-radius: var(--card-radius);
      margin-bottom: 16px;
      box-shadow: var(--shadow-sm);
    }

    .filter-bar .el-form-item {
      margin-bottom: 12px;
    }

    .filter-bar .el-input,
    .filter-bar .el-select {
      width: 100%;
    }

    .filter-bar .el-date-editor--daterange {
      width: 100%;
    }

    /* ========== Toolbar ========== */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toolbar-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .toolbar-btn svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    /* ========== Expand Toggle ========== */
    .expand-toggle {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--color-primary);
      cursor: pointer;
      font-size: 13px;
      user-select: none;
      margin-bottom: 12px;
    }

    .expand-toggle:hover {
      color: #3d85f0;
    }

    .expand-toggle svg {
      width: 14px;
      height: 14px;
      transition: transform 0.25s ease;
    }

    .expand-toggle.is-expanded svg {
      transform: rotate(180deg);
    }

    /* ========== Table Card ========== */
    .table-card {
      background: var(--card-bg);
      border-radius: var(--card-radius);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .table-card .el-table {
      --el-table-border-color: rgba(0,0,0,0.06);
      --el-table-header-bg-color: var(--table-header-bg);
      --el-table-row-height: 48px;
      --el-table-header-text-color: var(--text-primary);
      --el-table-text-color: var(--text-secondary);
      font-size: 14px;
    }

    .table-card .el-table th.el-table__cell {
      font-weight: 600;
      color: var(--text-primary);
      background: var(--table-header-bg);
    }

    .table-card .el-table .el-table__row td {
      height: 48px;
    }

    /* ========== Action Buttons (row-level) ========== */
    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 0;
      height: auto;
      font-size: 13px;
    }

    .action-btn svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .action-btn--edit {
      color: var(--color-primary);
    }

    .action-btn--edit:hover {
      color: #3d85f0;
    }

    .action-btn--delete {
      color: var(--color-danger);
    }

    .action-btn--delete:hover {
      color: #f78989;
    }

    /* ========== Pagination Bar ========== */
    .pagination-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-top: 1px solid rgba(0,0,0,0.06);
    }

    .pagination-total {
      font-size: 13px;
      color: var(--text-muted);
    }

    .pagination-bar .el-pagination {
      --el-pagination-font-size: 13px;
    }

    .pagination-bar .el-pagination .el-input {
      width: 80px;
    }

    /* ========== Collapse Transition ========== */
    .filter-collapse-enter-active,
    .filter-collapse-leave-active {
      transition: all 0.3s ease;
      overflow: hidden;
    }

    .filter-collapse-enter-from,
    .filter-collapse-leave-to {
      opacity: 0;
      max-height: 0;
    }

    .filter-collapse-enter-to,
    .filter-collapse-leave-from {
      opacity: 1;
      max-height: 200px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="page-container">

      <!-- 筛选区 -->
      <div class="filter-bar">
        <el-form :model="filterForm" @submit.prevent="handleSearch">
          <!-- 第一行：常用筛选 -->
          <el-row :gutter="12">
            <el-col :xs="24" :sm="12" :md="6">
              <el-form-item label="名称">
                <el-input
                  v-model="filterForm.keyword"
                  placeholder="搜索名称"
                  clearable
                  @keyup.enter="handleSearch"
                >
                  <template #prefix>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <circle cx="11" cy="11" r="8"/>
                      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                  </template>
                </el-input>
              </el-form-item>
            </el-col>
            <el-col :xs="24" :sm="12" :md="6">
              <el-form-item label="状态">
                <el-select v-model="filterForm.status" placeholder="全部状态" clearable>
                  <el-option label="启用" value="active" />
                  <el-option label="禁用" value="disabled" />
                  <el-option label="草稿" value="draft" />
                </el-select>
              </el-form-item>
            </el-col>
            <el-col :xs="24" :sm="12" :md="6">
              <el-form-item label="类型">
                <el-select v-model="filterForm.type" placeholder="全部类型" clearable>
                  <el-option label="标准模块" value="standard" />
                  <el-option label="扩展模块" value="extension" />
                  <el-option label="插件" value="plugin" />
                </el-select>
              </el-form-item>
            </el-col>
            <el-col :xs="24" :sm="12" :md="6">
              <el-form-item label="日期">
                <el-date-picker
                  v-model="filterForm.dateRange"
                  type="daterange"
                  range-separator="-"
                  start-placeholder="开始日期"
                  end-placeholder="结束日期"
                  value-format="YYYY-MM-DD"
                />
              </el-form-item>
            </el-col>
          </el-row>

          <!-- 折叠区：更多筛选项 -->
          <div v-show="filterExpanded" style="overflow: hidden;">
            <el-row :gutter="12">
              <el-col :xs="24" :sm="12" :md="6">
                <el-form-item label="创建人">
                  <el-input
                    v-model="filterForm.creator"
                    placeholder="输入创建人"
                    clearable
                  />
                </el-form-item>
              </el-col>
              <el-col :xs="24" :sm="12" :md="6">
                <el-form-item label="优先级">
                  <el-select v-model="filterForm.priority" placeholder="全部优先级" clearable>
                    <el-option label="高" value="high" />
                    <el-option label="中" value="medium" />
                    <el-option label="低" value="low" />
                  </el-select>
                </el-form-item>
              </el-col>
              <el-col :xs="24" :sm="12" :md="6">
                <el-form-item label="标签">
                  <el-select v-model="filterForm.tag" placeholder="全部标签" clearable>
                    <el-option label="核心" value="core" />
                    <el-option label="实验" value="experimental" />
                    <el-option label="废弃" value="deprecated" />
                  </el-select>
                </el-form-item>
              </el-col>
            </el-row>
          </div>

          <!-- 展开/收起 -->
          <div
            class="expand-toggle"
            :class="{ 'is-expanded': filterExpanded }"
            @click="filterExpanded = !filterExpanded"
          >
            <span>{{ filterExpanded ? '收起筛选' : '更多筛选' }}</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>
        </el-form>
      </div>

      <!-- 操作按钮区 -->
      <div class="toolbar">
        <div class="toolbar-left">
          <el-button type="primary" class="toolbar-btn" @click="handleAdd">
            <!-- IconPark: plus -->
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            新增
          </el-button>
          <el-button class="toolbar-btn" @click="handleImport">
            <!-- IconPark: upload -->
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="16 16 12 12 8 16"/>
              <line x1="12" y1="12" x2="12" y2="21"/>
              <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
            </svg>
            导入
          </el-button>
          <el-button class="toolbar-btn" @click="handleExport">
            <!-- IconPark: download -->
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="8 17 12 21 16 17"/>
              <line x1="12" y1="12" x2="12" y2="21"/>
              <path d="M20.88 18.09A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
            </svg>
            导出
          </el-button>
        </div>
        <div class="toolbar-right">
          <el-button type="primary" class="toolbar-btn" @click="handleSearch">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            查询
          </el-button>
          <el-button class="toolbar-btn" @click="handleReset">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="1 4 1 10 7 10"/>
              <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
            </svg>
            重置
          </el-button>
        </div>
      </div>

      <!-- 表格区 -->
      <div class="table-card">
        <el-table
          :data="tableData"
          border
          stripe
          style="width: 100%"
        >
          <el-table-column prop="name" label="名称" min-width="200" show-overflow-tooltip />
          <el-table-column prop="type" label="类型" width="110" align="center">
            <template #default="{ row }">
              <el-tag
                :type="typeTagType(row.type)"
                size="small"
                effect="light"
              >
                {{ typeLabel(row.type) }}
              </el-tag>
            </template>
          </el-table-column>
          <el-table-column prop="status" label="状态" width="100" align="center">
            <template #default="{ row }">
              <el-tag
                :type="statusTagType(row.status)"
                size="small"
                effect="light"
              >
                {{ statusLabel(row.status) }}
              </el-tag>
            </template>
          </el-table-column>
          <el-table-column prop="priority" label="优先级" width="90" align="center">
            <template #default="{ row }">
              <el-tag
                :type="priorityTagType(row.priority)"
                size="small"
                effect="plain"
              >
                {{ priorityLabel(row.priority) }}
              </el-tag>
            </template>
          </el-table-column>
          <el-table-column prop="creator" label="创建人" width="100" />
          <el-table-column prop="createdAt" label="创建时间" width="180" />
          <el-table-column label="操作" width="150" fixed="right" align="center">
            <template #default="{ row }">
              <el-button
                class="action-btn action-btn--edit"
                type="primary"
                link
                @click="handleEdit(row)"
              >
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
                </svg>
                编辑
              </el-button>
              <el-button
                class="action-btn action-btn--delete"
                type="danger"
                link
                @click="handleDelete(row)"
              >
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="3 6 5 6 21 6"/>
                  <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                  <path d="M10 11v6"/>
                  <path d="M14 11v6"/>
                  <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                </svg>
                删除
              </el-button>
            </template>
          </el-table-column>
        </el-table>

        <!-- 分页栏 -->
        <div class="pagination-bar">
          <span class="pagination-total">共 {{ total }} 条</span>
          <el-pagination
            v-model:current-page="pagination.page"
            v-model:page-size="pagination.pageSize"
            :page-sizes="[20, 50, 100, 200, 500]"
            :total="total"
            layout="sizes, prev, pager, next, jumper"
            @size-change="handlePageChange"
            @current-change="handlePageChange"
          />
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus/dist/index.full.min.js"></script>
  <script>
    const { createApp, ref, reactive } = Vue;

    const app = createApp({
      setup() {
        /* ---- 筛选表单 ---- */
        const filterForm = reactive({
          keyword: '',
          status: '',
          type: '',
          dateRange: null,
          creator: '',
          priority: '',
          tag: '',
        });

        /* ---- 筛选展开状态 ---- */
        const filterExpanded = ref(false);

        /* ---- 分页 ---- */
        const pagination = reactive({
          page: 1,
          pageSize: 50,
        });
        const total = ref(326);

        /* ---- 示例数据 ---- */
        const tableData = ref([
          { id: 1, name: '供应链管理模块',     type: 'standard',   status: 'active',   priority: 'high',   creator: '张三', createdAt: '2026-07-10 09:30:00' },
          { id: 2, name: '客户关系管理系统',   type: 'standard',   status: 'active',   priority: 'medium', creator: '李四', createdAt: '2026-07-09 14:20:00' },
          { id: 3, name: '财务报表引擎',       type: 'extension',  status: 'disabled', priority: 'high',   creator: '王五', createdAt: '2026-07-08 11:05:00' },
          { id: 4, name: '权限网关服务',       type: 'standard',   status: 'draft',    priority: 'low',    creator: '赵六', createdAt: '2026-07-07 16:45:00' },
          { id: 5, name: '数据同步中间件',     type: 'extension',  status: 'active',   priority: 'medium', creator: '孙七', createdAt: '2026-07-06 08:10:00' },
          { id: 6, name: '消息队列插件',       type: 'plugin',     status: 'active',   priority: 'low',    creator: '周八', createdAt: '2026-07-05 10:30:00' },
          { id: 7, name: '日志采集服务',       type: 'standard',   status: 'active',   priority: 'medium', creator: '吴九', createdAt: '2026-07-04 15:00:00' },
        ]);

        /* ---- 类型映射 ---- */
        function typeTagType(type) {
          const map = { standard: '', extension: 'warning', plugin: 'success' };
          return map[type] || 'info';
        }

        function typeLabel(type) {
          const map = { standard: '标准模块', extension: '扩展模块', plugin: '插件' };
          return map[type] || type;
        }

        /* ---- 状态映射 ---- */
        function statusTagType(status) {
          const map = { active: 'success', disabled: 'danger', draft: 'warning' };
          return map[status] || 'info';
        }

        function statusLabel(status) {
          const map = { active: '启用', disabled: '禁用', draft: '草稿' };
          return map[status] || status;
        }

        /* ---- 优先级映射 ---- */
        function priorityTagType(priority) {
          const map = { high: 'danger', medium: 'warning', low: 'info' };
          return map[priority] || '';
        }

        function priorityLabel(priority) {
          const map = { high: '高', medium: '中', low: '低' };
          return map[priority] || priority;
        }

        /* ---- 事件处理 ---- */
        function handleSearch() {
          ElementPlus.ElMessage.success('查询条件：' + JSON.stringify({
            keyword: filterForm.keyword,
            status: filterForm.status,
            type: filterForm.type,
            dateRange: filterForm.dateRange,
            creator: filterForm.creator,
            priority: filterForm.priority,
            tag: filterForm.tag,
          }));
        }

        function handleReset() {
          filterForm.keyword = '';
          filterForm.status = '';
          filterForm.type = '';
          filterForm.dateRange = null;
          filterForm.creator = '';
          filterForm.priority = '';
          filterForm.tag = '';
          pagination.page = 1;
          ElementPlus.ElMessage.info('已重置筛选条件');
        }

        function handleAdd() {
          ElementPlus.ElMessage.info('新增记录');
        }

        function handleImport() {
          ElementPlus.ElMessage.info('导入数据');
        }

        function handleExport() {
          ElementPlus.ElMessage.info('导出数据');
        }

        function handleEdit(row) {
          ElementPlus.ElMessage.info('编辑：' + row.name);
        }

        function handleDelete(row) {
          ElementPlus.ElMessageBox.confirm(
            '确定删除「' + row.name + '」？删除后无法恢复。',
            '确认删除',
            { confirmButtonText: '删除', cancelButtonText: '取消', type: 'warning' }
          ).then(() => {
            ElementPlus.ElMessage.success('已删除：' + row.name);
          }).catch(() => {});
        }

        function handlePageChange() {
          // 替换为实际接口调用
        }

        return {
          filterForm,
          filterExpanded,
          pagination,
          total,
          tableData,
          typeTagType,
          typeLabel,
          statusTagType,
          statusLabel,
          priorityTagType,
          priorityLabel,
          handleSearch,
          handleReset,
          handleAdd,
          handleImport,
          handleExport,
          handleEdit,
          handleDelete,
          handlePageChange,
        };
      },
    });

    app.use(ElementPlus);
    app.mount('#app');
  </script>
</body>
</html>
